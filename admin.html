<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>단가 관리 - 용인 랙</title>
  <meta name="description" content="랙 단가 관리 페이지">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1e3a5f',
            accent: '#f97316',
          },
          fontFamily: {
            sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Pretendard Font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3a5f">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <style>
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .animate-shake { animation: shake 0.3s ease-in-out; }
    body { font-family: 'Pretendard', sans-serif; padding-bottom: 100px; }
    .chip { display:inline-flex; align-items:center; justify-content:center; padding:8px 14px; border-radius:9999px; font-size:13px; font-weight:600; border:2px solid #e5e7eb; color:#374151; background:#fff; cursor:pointer; transition:all 0.15s; user-select:none; }
    .chip:active { transform:scale(0.95); }
    .chip.selected { border-color:#1e3a5f; background:#1e3a5f; color:#fff; }
    .chip-form.selected { border-color:#f97316; background:#f97316; color:#fff; }
  </style>
</head>
<body class="bg-[#f7fafc] min-h-screen">

  <!-- 헤더 -->
  <header class="bg-primary text-white px-4 py-4 flex items-center gap-3">
    <a href="more.html" class="text-xl">←</a>
    <h1 class="text-lg font-bold flex-1">단가 관리</h1>
  </header>

  <main class="max-w-lg mx-auto">
    <!-- 가격 목록 -->
    <div class="mx-4 mt-4" id="price-list">
      <!-- 스켈레톤 로딩 -->
      <div id="skeleton-area"></div>
    </div>

    <!-- 빈 상태 -->
    <div id="empty-state" class="hidden mx-4 mt-4"></div>
  </main>

  <!-- 랙 추가 FAB -->
  <button onclick="openAddModal()"
    class="fixed bottom-24 right-4 w-14 h-14 bg-accent text-white rounded-full shadow-lg flex items-center justify-center text-2xl font-bold active:scale-95 transition-transform z-30">
    +
  </button>

  <!-- 추가/수정 모달 -->
  <div id="price-modal" class="fixed inset-0 bg-black/50 z-50 flex items-end justify-center hidden">
    <div class="bg-white rounded-t-2xl w-full max-w-lg p-6 pb-8 animate-slide-up">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-bold text-gray-800" id="modal-title">랙 추가</h2>
        <button onclick="closeModal()" class="text-gray-400 text-2xl">&times;</button>
      </div>
      <form id="price-form" class="space-y-4">
        <input type="hidden" id="edit-row-index" value="">
        <input type="hidden" id="f-type" value="">
        <input type="hidden" id="f-form" value="">

        <!-- 랙 종류 칩 -->
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-2">랙 종류</label>
          <div id="type-chips" class="flex flex-wrap gap-2"></div>
          <input type="text" id="f-type-custom" placeholder="랙 종류를 직접 입력하세요"
            class="w-full h-10 px-3 border-2 border-gray-200 rounded-lg text-sm focus:border-primary focus:outline-none mt-2 hidden">
        </div>

        <!-- 형태 칩 -->
        <div id="form-group" class="hidden">
          <label class="block text-xs font-semibold text-gray-500 mb-2">형태</label>
          <div id="form-chips" class="flex flex-wrap gap-2"></div>
          <input type="text" id="f-form-custom" placeholder="형태를 직접 입력하세요"
            class="w-full h-10 px-3 border-2 border-gray-200 rounded-lg text-sm focus:border-primary focus:outline-none mt-2 hidden">
        </div>

        <!-- 규격 (구조화 입력) -->
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">규격</label>
          <div class="grid grid-cols-4 gap-2">
            <div>
              <label class="block text-[10px] text-gray-400 mb-0.5 text-center">가로(W)</label>
              <input type="number" id="f-w" placeholder="1200" min="1"
                class="w-full h-10 px-2 border-2 border-gray-200 rounded-lg text-sm text-center focus:border-primary focus:outline-none">
            </div>
            <div>
              <label class="block text-[10px] text-gray-400 mb-0.5 text-center">세로(D)</label>
              <input type="number" id="f-d" placeholder="600" min="1"
                class="w-full h-10 px-2 border-2 border-gray-200 rounded-lg text-sm text-center focus:border-primary focus:outline-none">
            </div>
            <div>
              <label class="block text-[10px] text-gray-400 mb-0.5 text-center">높이(H)</label>
              <input type="number" id="f-h" placeholder="2100" min="1"
                class="w-full h-10 px-2 border-2 border-gray-200 rounded-lg text-sm text-center focus:border-primary focus:outline-none">
            </div>
            <div>
              <label class="block text-[10px] text-gray-400 mb-0.5 text-center">단수</label>
              <input type="number" id="f-tier" placeholder="4" min="1" max="20"
                class="w-full h-10 px-2 border-2 border-gray-200 rounded-lg text-sm text-center focus:border-primary focus:outline-none">
            </div>
          </div>
          <p class="text-[10px] text-gray-400 mt-1" id="spec-preview"></p>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">기본 단가 (원)</label>
            <input type="number" id="f-unit-price" placeholder="150000" required
              class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">추가 시공비 (원)</label>
            <input type="number" id="f-install-fee" placeholder="30000"
              class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">VAT 적용</label>
          <select id="f-vat" class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
            <option value="별도">별도</option>
            <option value="포함">포함</option>
          </select>
        </div>
        <button type="submit" id="btn-submit"
          class="w-full h-14 bg-primary text-white rounded-xl font-bold text-lg active:scale-[0.98] transition-transform">
          저장
        </button>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    let prices = [];

    // 랙 종류별 형태 매핑
    const RACK_TYPES = ['무볼트앵글', '경량랙', '중량랙', '파렛트랙', '곤도라 진열대', '하이퍼 진열대'];
    const RACK_FORMS = {
      '무볼트앵글': ['독립', '연결', '벽부착', '이동'],
      '경량랙': ['독립', '연결', '벽면'],
      '중량랙': ['독립', '연결', '이동'],
      '파렛트랙': ['독립', '연결'],
      '곤도라 진열대': ['중앙독립', '중앙연결', '벽대독립', '벽대연결', '엔드독립', '엔드연결'],
      '하이퍼 진열대': ['중앙독립', '중앙연결', '벽대독립', '벽대연결', '엔드독립', '엔드연결'],
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.guard()) {
        window.addEventListener('yr-authenticated', init);
        return;
      }
      init();
    });

    async function init() {
      document.getElementById('skeleton-area').innerHTML = UI.skeleton(4);
      await loadPrices();
      document.getElementById('price-form').addEventListener('submit', handleSubmit);

      // 규격 미리보기 업데이트
      ['f-w', 'f-d', 'f-h', 'f-tier'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('input', updateSpecPreview);
      });
    }

    function updateSpecPreview() {
      const w = document.getElementById('f-w').value;
      const d = document.getElementById('f-d').value;
      const h = document.getElementById('f-h').value;
      const t = document.getElementById('f-tier').value;
      const preview = document.getElementById('spec-preview');
      if (!preview) return;
      const parts = [w, d, h].filter(Boolean).join('*');
      const spec = parts + (t ? `*${t}s` : '');
      preview.textContent = spec ? `규격: ${spec}` : '';
    }

    // --- 칩 렌더링 ---
    function renderTypeChips(selectedType) {
      const container = document.getElementById('type-chips');
      container.innerHTML = RACK_TYPES.map(t =>
        `<span class="chip ${t === selectedType ? 'selected' : ''}" onclick="selectType('${t}')">${t}</span>`
      ).join('') + `<span class="chip ${selectedType === '__custom__' ? 'selected' : ''}" onclick="selectType('__custom__')">기타 ✏️</span>`;
    }

    function renderFormChips(type, selectedForm) {
      const group = document.getElementById('form-group');
      const container = document.getElementById('form-chips');
      const forms = RACK_FORMS[type];
      if (!forms && type !== '__custom__') {
        group.classList.add('hidden');
        return;
      }
      group.classList.remove('hidden');
      if (type === '__custom__') {
        container.innerHTML = '';
        document.getElementById('f-form-custom').classList.remove('hidden');
        return;
      }
      container.innerHTML = forms.map(f =>
        `<span class="chip chip-form ${f === selectedForm ? 'selected' : ''}" onclick="selectForm('${f}')">${f}</span>`
      ).join('') + `<span class="chip chip-form ${selectedForm === '__custom__' ? 'selected' : ''}" onclick="selectForm('__custom__')">기타 ✏️</span>`;
      document.getElementById('f-form-custom').classList.add('hidden');
    }

    function selectType(type) {
      document.getElementById('f-type').value = type;
      renderTypeChips(type);
      const customInput = document.getElementById('f-type-custom');
      if (type === '__custom__') {
        customInput.classList.remove('hidden');
        customInput.focus();
        document.getElementById('form-group').classList.add('hidden');
      } else {
        customInput.classList.add('hidden');
        customInput.value = '';
        document.getElementById('f-form').value = '';
        renderFormChips(type, '');
      }
    }

    function selectForm(form) {
      document.getElementById('f-form').value = form;
      const type = document.getElementById('f-type').value;
      renderFormChips(type, form);
      const customInput = document.getElementById('f-form-custom');
      if (form === '__custom__') {
        customInput.classList.remove('hidden');
        customInput.focus();
      } else {
        customInput.classList.add('hidden');
        customInput.value = '';
      }
    }

    function getSelectedType() {
      const type = document.getElementById('f-type').value;
      if (type === '__custom__') return document.getElementById('f-type-custom').value.trim();
      return type;
    }

    function getSelectedForm() {
      const form = document.getElementById('f-form').value;
      if (form === '__custom__') return document.getElementById('f-form-custom').value.trim();
      return form;
    }

    async function loadPrices() {
      try {
        const data = await API.getPrices();
        prices = data.prices || [];
        renderPrices();
      } catch (err) {
        UI.toast(err.message || '단가 로딩 실패', 'error');
        const sk = document.getElementById('skeleton-area');
        if (sk) sk.innerHTML = '';
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('empty-state').innerHTML = UI.empty(
          '⚠️', '로딩 실패', err.message || '단가를 불러올 수 없습니다', '다시 시도', 'admin.html'
        );
      }
    }

    function renderPrices() {
      const sk = document.getElementById('skeleton-area');
      if (sk) sk.innerHTML = '';
      const list = document.getElementById('price-list');
      const empty = document.getElementById('empty-state');

      if (prices.length === 0) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        empty.innerHTML = UI.empty(
          '📦', '등록된 단가가 없습니다', '랙 단가를 추가하여 견적을 시작하세요', '+ 랙 추가', 'javascript:openAddModal()'
        );
        return;
      }

      empty.classList.add('hidden');
      list.innerHTML = prices.map((p, i) => `
        <div class="bg-white rounded-xl border border-gray-100 p-4 mb-3">
          <div class="flex items-start justify-between mb-2">
            <div>
              <span class="inline-block px-2 py-0.5 rounded-full text-xs font-bold bg-blue-100 text-blue-700 mb-1">${p.type || ''}</span>
              ${p.form ? `<span class="inline-block px-2 py-0.5 rounded-full text-xs font-bold bg-orange-100 text-orange-700 mb-1 ml-1">${p.form}</span>` : ''}
              <h3 class="text-base font-bold text-gray-800">${p.spec || ''} ${p.tier ? p.tier + '단' : ''}</h3>
            </div>
          </div>
          <div class="flex items-center gap-4 text-sm text-gray-600 mb-3">
            <span>단가 <b class="text-gray-800">${UI.formatCurrency(p.unitPrice || 0)}</b></span>
            <span>시공비 <b class="text-gray-800">${UI.formatCurrency(p.installFee || 0)}</b></span>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-xs text-gray-400">VAT ${p.vat || '별도'}</span>
            <div class="flex gap-2">
              <button onclick="openEditModal(${i})"
                class="px-4 py-2 text-sm font-bold text-primary border border-primary rounded-lg active:bg-blue-50">수정</button>
              <button onclick="handleDelete(${i})"
                class="px-4 py-2 text-sm font-bold text-red-500 border border-red-300 rounded-lg active:bg-red-50">삭제</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openAddModal() {
      document.getElementById('modal-title').textContent = '랙 추가';
      document.getElementById('edit-row-index').value = '';
      document.getElementById('price-form').reset();
      document.getElementById('f-type').value = '';
      document.getElementById('f-form').value = '';
      document.getElementById('f-type-custom').classList.add('hidden');
      document.getElementById('f-type-custom').value = '';
      document.getElementById('f-form-custom').classList.add('hidden');
      document.getElementById('f-form-custom').value = '';
      document.getElementById('form-group').classList.add('hidden');
      document.getElementById('spec-preview').textContent = '';
      renderTypeChips('');
      document.getElementById('price-modal').classList.remove('hidden');
    }

    function openEditModal(index) {
      const p = prices[index];
      document.getElementById('modal-title').textContent = '단가 수정';
      document.getElementById('edit-row-index').value = p.rowIndex ?? index;

      // 타입 설정
      const isCustomType = !RACK_TYPES.includes(p.type);
      if (isCustomType) {
        document.getElementById('f-type').value = '__custom__';
        document.getElementById('f-type-custom').classList.remove('hidden');
        document.getElementById('f-type-custom').value = p.type || '';
        renderTypeChips('__custom__');
        document.getElementById('form-group').classList.add('hidden');
      } else {
        document.getElementById('f-type').value = p.type;
        document.getElementById('f-type-custom').classList.add('hidden');
        document.getElementById('f-type-custom').value = '';
        renderTypeChips(p.type);

        // 형태 설정
        const forms = RACK_FORMS[p.type] || [];
        const isCustomForm = p.form && !forms.includes(p.form);
        if (isCustomForm) {
          document.getElementById('f-form').value = '__custom__';
          document.getElementById('f-form-custom').classList.remove('hidden');
          document.getElementById('f-form-custom').value = p.form || '';
          renderFormChips(p.type, '__custom__');
        } else {
          document.getElementById('f-form').value = p.form || '';
          document.getElementById('f-form-custom').classList.add('hidden');
          document.getElementById('f-form-custom').value = '';
          renderFormChips(p.type, p.form || '');
        }
      }

      // 규격 파싱 (W*D*H 형태)
      const specParts = (p.spec || '').split(/[*xX×]/);
      document.getElementById('f-w').value = specParts[0] || '';
      document.getElementById('f-d').value = specParts[1] || '';
      document.getElementById('f-h').value = specParts[2] || '';
      document.getElementById('f-tier').value = p.tier || '';
      document.getElementById('f-unit-price').value = p.unitPrice || '';
      document.getElementById('f-install-fee').value = p.installFee || '';
      document.getElementById('f-vat').value = p.vat || '별도';
      updateSpecPreview();
      document.getElementById('price-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('price-modal').classList.add('hidden');
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      UI.setLoading(btn, true);

      const typeName = getSelectedType();
      if (!typeName) {
        UI.toast('랙 종류를 선택하세요', 'warning');
        UI.setLoading(btn, false);
        return;
      }

      const formName = getSelectedForm();

      // 규격 조합
      const w = document.getElementById('f-w').value;
      const d = document.getElementById('f-d').value;
      const h = document.getElementById('f-h').value;
      const spec = [w, d, h].filter(Boolean).join('*');

      const data = {
        type: typeName,
        form: formName,
        spec: spec,
        tier: Number(document.getElementById('f-tier').value) || 0,
        unitPrice: Number(document.getElementById('f-unit-price').value),
        installFee: Number(document.getElementById('f-install-fee').value) || 0,
        vat: document.getElementById('f-vat').value,
      };

      const rowIndex = document.getElementById('edit-row-index').value;

      try {
        if (rowIndex !== '') {
          await API.updatePrice(Number(rowIndex), data);
          UI.toast('단가가 수정되었습니다', 'success');
        } else {
          await API.addPrice(data);
          UI.toast('단가가 추가되었습니다', 'success');
        }
        closeModal();
        await loadPrices();
      } catch (err) {
        UI.toast(err.message || '저장 실패', 'error');
      } finally {
        UI.setLoading(btn, false);
      }
    }

    function handleDelete(index) {
      const p = prices[index];
      const displayName = `${p.type}${p.form ? '(' + p.form + ')' : ''} ${p.spec} ${p.tier ? p.tier + '단' : ''}`;
      UI.confirm(
        '단가 삭제',
        `"${displayName}" 단가를 삭제하시겠습니까?`,
        async () => {
          try {
            await API.deletePrice(p.rowIndex ?? index);
            UI.toast('삭제되었습니다', 'success');
            await loadPrices();
          } catch (err) {
            UI.toast(err.message || '삭제 실패', 'error');
          }
        }
      );
    }
  </script>

  <!-- Service Worker 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
