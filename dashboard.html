<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>중용 - 대시보드</title>
  <meta name="description" content="견적 대시보드 및 이력 관리">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3a5f">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#1e3a5f', accent: '#f97316' },
          fontFamily: { sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] },
        },
      },
    };
  </script>

  <!-- Pretendard Font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

  <style>
    body { font-family: 'Pretendard', sans-serif; padding-bottom: 80px; }
  </style>
</head>
<body class="bg-[#f7fafc] min-h-screen">

  <!-- 헤더 -->
  <header class="bg-primary text-white px-4 py-4 sticky top-0 z-40">
    <h1 class="text-lg font-bold">대시보드</h1>
  </header>

  <main class="max-w-lg mx-auto">
    <!-- 통계 카드 -->
    <div class="mx-4 mt-4 grid grid-cols-3 gap-3" id="stat-cards">
      <div class="animate-pulse bg-white rounded-xl border border-gray-100 p-4">
        <div class="h-3 bg-gray-200 rounded w-2/3 mb-3"></div>
        <div class="h-6 bg-gray-200 rounded w-1/2"></div>
      </div>
      <div class="animate-pulse bg-white rounded-xl border border-gray-100 p-4">
        <div class="h-3 bg-gray-200 rounded w-2/3 mb-3"></div>
        <div class="h-6 bg-gray-200 rounded w-1/2"></div>
      </div>
      <div class="animate-pulse bg-white rounded-xl border border-gray-100 p-4">
        <div class="h-3 bg-gray-200 rounded w-2/3 mb-3"></div>
        <div class="h-6 bg-gray-200 rounded w-1/2"></div>
      </div>
    </div>

    <!-- 검색 + 필터 -->
    <div class="mx-4 mt-4">
      <input type="text" id="search-input" placeholder="고객명으로 검색..."
        class="w-full h-11 px-4 border-2 border-gray-200 rounded-xl text-sm focus:border-primary focus:outline-none bg-white"
        oninput="filterEstimates()">
    </div>
    <div class="mx-4 mt-3 flex gap-2 overflow-x-auto pb-1" id="status-tabs">
      <button onclick="setFilter('전체')" data-status="전체"
        class="status-tab flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold bg-primary text-white">전체</button>
      <button onclick="setFilter('상담완료')" data-status="상담완료"
        class="status-tab flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-500">상담완료</button>
      <button onclick="setFilter('계약')" data-status="계약"
        class="status-tab flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-500">계약</button>
      <button onclick="setFilter('시공중')" data-status="시공중"
        class="status-tab flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-500">시공중</button>
      <button onclick="setFilter('시공완료')" data-status="시공완료"
        class="status-tab flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-500">시공완료</button>
    </div>

    <!-- 견적 목록 -->
    <div class="mx-4 mt-3" id="estimate-list"></div>
  </main>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/estimate.js"></script>
  <script>
    let allEstimates = [];
    let currentFilter = '전체';
    let expandedId = null;
    const STATUSES = ['상담완료', '계약', '시공중', '시공완료'];

    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.guard()) {
        window.addEventListener('yr-authenticated', init);
        return;
      }
      init();
    });

    async function init() {
      UI.renderTabBar('dashboard');
      document.getElementById('estimate-list').innerHTML = UI.skeleton(3);
      await Promise.all([loadDashboard(), loadEstimates()]);
    }

    // --- 통계 ---
    async function loadDashboard() {
      try {
        const data = await API.getDashboard();
        renderStats(data);
      } catch {
        document.getElementById('stat-cards').innerHTML = `
          <div class="col-span-3 bg-white rounded-xl border border-gray-100 p-4 text-center">
            <p class="text-xs text-gray-400 mb-1">이번 달 견적</p>
            <p class="text-2xl font-extrabold text-primary">0<span class="text-sm font-bold">건</span></p>
          </div>`;
      }
    }

    function renderStats(data) {
      const count = data.count || 0;
      const total = data.totalAmount || 0;
      const conversion = count > 0 ? Math.round((data.contracted || 0) / count * 100) : 0;
      document.getElementById('stat-cards').innerHTML = `
        <div class="bg-white rounded-xl border border-gray-100 p-3 text-center">
          <p class="text-[11px] text-gray-400 mb-0.5">이번 달</p>
          <p class="text-xl font-extrabold text-primary">${count}<span class="text-xs font-bold">건</span></p>
        </div>
        <div class="bg-white rounded-xl border border-gray-100 p-3 text-center">
          <p class="text-[11px] text-gray-400 mb-0.5">총액</p>
          <p class="text-lg font-extrabold text-accent">${formatCompact(total)}</p>
        </div>
        <div class="bg-white rounded-xl border border-gray-100 p-3 text-center">
          <p class="text-[11px] text-gray-400 mb-0.5">계약률</p>
          <p class="text-xl font-extrabold text-primary">${conversion}<span class="text-xs font-bold">%</span></p>
        </div>`;
    }

    function formatCompact(n) {
      if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
      if (n >= 10000) return (n / 10000).toFixed(0) + '만';
      return UI.formatCurrency(n);
    }

    // --- 견적 목록 (이력 통합) ---
    async function loadEstimates() {
      try {
        const data = await API.getEstimates();
        allEstimates = (data && data.estimates) ? data.estimates : [];
        renderList();
      } catch {
        document.getElementById('estimate-list').innerHTML =
          `<div class="text-center py-8 text-sm text-red-500">데이터를 불러올 수 없습니다.<br><button onclick="loadEstimates()" class="mt-2 text-primary font-bold underline">다시 시도</button></div>`;
      }
    }

    function setFilter(status) {
      currentFilter = status;
      document.querySelectorAll('.status-tab').forEach(btn => {
        const isActive = btn.dataset.status === status;
        btn.className = `status-tab flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold ${isActive ? 'bg-primary text-white' : 'bg-gray-100 text-gray-500'}`;
      });
      renderList();
    }

    function filterEstimates() { renderList(); }

    function getFiltered() {
      const query = (document.getElementById('search-input').value || '').trim().toLowerCase();
      return allEstimates.filter(e => {
        const matchStatus = currentFilter === '전체' || e.status === currentFilter;
        const matchSearch = !query || (e.customerName || '').toLowerCase().includes(query);
        return matchStatus && matchSearch;
      });
    }

    function renderList() {
      const list = getFiltered();
      const container = document.getElementById('estimate-list');

      if (allEstimates.length === 0) {
        container.innerHTML = UI.empty('📋', '아직 견적이 없습니다', '첫 견적을 만들어보세요!', '새 견적 작성', 'index.html');
        return;
      }
      if (list.length === 0) {
        container.innerHTML = `<div class="text-center py-12 text-sm text-gray-400">검색 결과가 없습니다.</div>`;
        return;
      }
      container.innerHTML = list.map(e => renderCard(e)).join('');
    }

    function renderCard(e) {
      const isExpanded = expandedId === e.estimateId;
      return `
        <div class="bg-white rounded-xl border border-gray-100 mb-3 overflow-hidden">
          <div class="p-3 cursor-pointer active:bg-gray-50" onclick="toggleExpand('${e.estimateId}')">
            <div class="flex items-start justify-between">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-0.5">
                  <span class="text-sm font-bold text-gray-800 truncate">${e.customerName || '미지정'}</span>
                  ${UI.statusBadge(e.status || '상담완료')}
                </div>
                <p class="text-xs text-gray-400">${UI.formatDate(e.date || '')} · ${e.itemSummary || '랙'} · ${e.totalQuantity || 0}대</p>
              </div>
              <div class="text-right flex-shrink-0 ml-3">
                <p class="text-sm font-extrabold text-primary">${UI.formatCurrency(e.total || 0)}</p>
                <span class="text-gray-300 text-xs">${isExpanded ? '▲' : '▼'}</span>
              </div>
            </div>
          </div>
          ${isExpanded ? renderDetail(e) : ''}
        </div>`;
    }

    function renderDetail(e) {
      const currentStatus = e.status || '상담완료';
      let items = e.items || [];
      if (typeof items === 'string') { try { items = JSON.parse(items); } catch { items = []; } }

      const itemsHtml = items.map(item => {
        const isCustom = item.itemType === 'custom';
        const qty = Number(item.quantity) || (isCustom ? 1 : 0);
        const uPrice = Number(item.unitPrice) || 0;
        const iFee = Number(item.installFee) || 0;
        const amount = isCustom ? uPrice * qty : (uPrice + iFee) * qty;
        const name = isCustom ? item.name : `${item.type} ${item.spec} ${item.tier}단 × ${qty}대`;
        return `<div class="flex justify-between text-xs py-1">
          <span class="${amount < 0 ? 'text-red-600' : 'text-gray-700'}">${name}</span>
          <span class="${amount < 0 ? 'text-red-600' : 'text-gray-600'} font-medium">${UI.formatCurrency(amount)}</span>
        </div>`;
      }).join('');

      return `
        <div class="border-t border-gray-100 px-3 py-3 bg-gray-50">
          <div class="grid grid-cols-2 gap-2 text-xs mb-3">
            <div><span class="text-gray-400">회사명</span><br><span class="font-medium text-gray-700">${e.company || '-'}</span></div>
            <div><span class="text-gray-400">연락처</span><br><span class="font-medium text-gray-700">${e.phone || '-'}</span></div>
            <div class="col-span-2"><span class="text-gray-400">현장 주소</span><br><span class="font-medium text-gray-700">${e.address || '-'}</span></div>
          </div>
          ${items.length > 0 ? `<div class="mb-3"><p class="text-xs font-bold text-gray-500 mb-1">품목 내역</p>${itemsHtml}</div>` : ''}
          <!-- 액션 버튼 -->
          <div class="flex gap-2 mb-3">
            <a href="estimate-preview.html?id=${e.estimateId}"
              class="flex-1 h-9 bg-primary text-white rounded-lg font-bold text-xs flex items-center justify-center gap-1 active:scale-[0.98] transition-transform">미리보기</a>
            <a href="index.html?from=edit&editId=${e.estimateId}"
              class="flex-1 h-9 bg-gray-600 text-white rounded-lg font-bold text-xs flex items-center justify-center gap-1 active:scale-[0.98] transition-transform">수정</a>
            <button onclick="shareEstimate('${e.estimateId}')"
              class="flex-1 h-9 bg-accent text-white rounded-lg font-bold text-xs flex items-center justify-center gap-1 active:scale-[0.98] transition-transform">공유하기</button>
          </div>
          <div>
            <p class="text-xs font-bold text-gray-500 mb-2">상태 변경</p>
            <div class="flex gap-2 flex-wrap">
              ${STATUSES.map(s => `
                <button onclick="changeStatus('${e.estimateId}', '${s}')"
                  class="px-3 py-1.5 rounded-full text-xs font-bold transition-colors ${s === currentStatus ? 'bg-primary text-white' : 'bg-gray-100 text-gray-500 active:bg-gray-200'}">${s}</button>
              `).join('')}
            </div>
          </div>
        </div>`;
    }

    function toggleExpand(id) {
      expandedId = expandedId === id ? null : id;
      renderList();
    }

    function shareEstimate(estimateId) {
      const e = allEstimates.find(est => est.estimateId === estimateId);
      if (e) Estimate.share(e);
    }

    async function changeStatus(estimateId, newStatus) {
      try {
        await API.updateStatus(estimateId, newStatus);
        const item = allEstimates.find(e => e.estimateId === estimateId);
        if (item) item.status = newStatus;
        UI.toast(`상태가 '${newStatus}'로 변경되었습니다`, 'success');
        renderList();

        // 계약 시 거래명세표 자동 안내
        if (newStatus === '계약') {
          setTimeout(() => {
            UI.confirm(
              '거래명세표 확인',
              '계약이 확정되었습니다. 거래명세표를 확인하시겠습니까?',
              () => { window.location.href = `estimate-preview.html?id=${estimateId}&doc=transaction`; }
            );
          }, 300);
        }
      } catch { UI.toast('상태 변경 실패', 'error'); }
    }
  </script>

  <!-- bfcache + Service Worker -->
  <script>
    window.addEventListener('pageshow', (e) => { if (e.persisted) location.reload(); });
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  </script>
</body>
</html>
