<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>견적 요청 확인 - 중용</title>
  <meta name="description" content="고객 견적 요청 확인">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#1e3a5f', accent: '#f97316' },
        fontFamily: { sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] } } }
    };
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3a5f">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <style>body { font-family: 'Pretendard', sans-serif; padding-bottom: 80px; }</style>
</head>
<body class="bg-[#f7fafc] min-h-screen">

  <header class="bg-primary text-white px-4 py-4">
    <h1 class="text-lg font-bold">견적 요청</h1>
  </header>

  <main class="max-w-lg mx-auto">
    <div class="mx-4 mt-4" id="request-list"></div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    let allRequests = [];
    const REQ_STATUSES = ['미처리', '연락완료', '견적발송', '완료'];

    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.guard()) {
        window.addEventListener('yr-authenticated', init);
        return;
      }
      init();
    });

    async function init() {
      UI.renderTabBar('requests');
      document.getElementById('request-list').innerHTML = UI.skeleton(3);
      await loadRequests();
    }

    async function loadRequests() {
      try {
        const data = await API.getRequests();
        allRequests = (data && data.requests) ? data.requests : [];
        renderRequests();
      } catch (err) {
        document.getElementById('request-list').innerHTML = UI.empty(
          '⚠️', '로딩 실패', err.message || '요청을 불러올 수 없습니다', '다시 시도', 'requests.html'
        );
      }
    }

    function renderRequests() {
      const container = document.getElementById('request-list');

      if (allRequests.length === 0) {
        container.innerHTML = UI.empty('📩', '요청이 없습니다', '고객의 견적 요청이 여기에 표시됩니다');
        return;
      }

      container.innerHTML = allRequests.map(r => {
        const phone = String(r.phone || '').replace(/^0?(\d+)/, (m, p) => {
          if (m.startsWith('0')) return m;
          return '0' + m;
        });
        const telNum = phone.replace(/-/g, '');
        const statusColor = r.status === '미처리' ? 'bg-red-100 text-red-600'
          : r.status === '완료' ? 'bg-green-100 text-green-600'
          : 'bg-blue-100 text-blue-600';
        const dateStr = r.date ? UI.formatDate(r.date) : '';

        return `
        <div class="bg-white rounded-xl border border-gray-100 p-4 mb-3">
          <div class="flex items-start justify-between mb-2">
            <div class="flex items-center gap-2">
              <span class="text-sm font-bold text-gray-800">${r.name || '미지정'}</span>
              <span class="px-2 py-0.5 rounded-full text-[11px] font-bold ${statusColor}">${r.status || '미처리'}</span>
            </div>
            <span class="text-xs text-gray-400">${dateStr}</span>
          </div>
          <div class="text-sm text-gray-600 space-y-1 mb-3">
            <a href="tel:${telNum}" class="flex items-center gap-1.5 text-primary font-semibold active:underline">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              ${phone || '-'}
            </a>
            <p class="text-gray-500">${r.rackType || '-'} · ${r.quantity || 0}대</p>
            ${r.memo ? `<p class="text-gray-400 text-xs">${r.memo}</p>` : ''}
          </div>
          <div class="flex gap-1.5 flex-wrap">
            ${REQ_STATUSES.map(s => `
              <button onclick="changeRequestStatus(${r.rowIndex}, '${s}')"
                class="px-2.5 py-1 rounded-full text-[11px] font-bold transition-colors ${s === (r.status || '미처리')
                  ? 'bg-primary text-white' : 'bg-gray-100 text-gray-500 active:bg-gray-200'}">${s}</button>
            `).join('')}
          </div>
        </div>`;
      }).join('');
    }

    async function changeRequestStatus(rowIndex, newStatus) {
      try {
        await API.updateRequestStatus(rowIndex, newStatus);
        const item = allRequests.find(r => r.rowIndex === rowIndex);
        if (item) item.status = newStatus;
        UI.toast(`'${newStatus}'로 변경되었습니다`, 'success');
        renderRequests();
      } catch { UI.toast('상태 변경 실패', 'error'); }
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  </script>
</body>
</html>
