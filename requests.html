<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>견적 요청 확인 - 중용</title>
  <meta name="description" content="고객 견적 요청 확인">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#1e3a5f', accent: '#f97316' },
        fontFamily: { sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] } } }
    };
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3a5f">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <style>body { font-family: 'Pretendard', sans-serif; padding-bottom: 80px; }</style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script src="js/onesignal-init.js?v=61" defer></script>
  <script src="js/version-check.js" defer></script>
</head>
<body class="bg-[#f7fafc] min-h-screen">

  <header class="bg-primary text-white px-4 py-4 sticky top-0 z-40">
    <h1 class="text-lg font-bold">견적 요청</h1>
  </header>

  <main class="max-w-lg mx-auto">
    <!-- 상태 필터 -->
    <div class="mx-4 mt-4 flex gap-2 overflow-x-auto pb-1">
      <button onclick="setFilter('전체')" data-status="전체"
        class="req-tab flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold bg-primary text-white">전체</button>
      <button onclick="setFilter('미처리')" data-status="미처리"
        class="req-tab flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-500">미처리</button>
      <button onclick="setFilter('연락완료')" data-status="연락완료"
        class="req-tab flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-500">연락완료</button>
      <button onclick="setFilter('견적발송')" data-status="견적발송"
        class="req-tab flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-500">견적발송</button>
      <button onclick="setFilter('완료')" data-status="완료"
        class="req-tab flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-500">완료</button>
    </div>

    <div class="mx-4 mt-3" id="request-list"></div>
  </main>

  <script src="js/api.js?v=61"></script>
  <script src="js/auth.js?v=61"></script>
  <script src="js/ui.js?v=61"></script>
  <script>
    let allRequests = [];
    let currentFilter = '전체';
    const REQ_STATUSES = ['미처리', '연락완료', '견적발송', '완료'];

    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.guard()) {
        window.addEventListener('yr-authenticated', init);
        return;
      }
      init();
    });

    let pollTimer = null;

    async function init() {
      UI.renderTabBar('requests');
      UI.updateRequestBadge(0);
      document.getElementById('request-list').innerHTML = UI.skeleton(3);
      await loadRequests();
      startPolling();
    }

    async function loadRequests() {
      // 1. 캐시된 데이터 즉시 표시 (첫 로드 시만)
      if (allRequests.length === 0) {
        try {
          const cached = localStorage.getItem('yr_requests_cache');
          if (cached) {
            allRequests = JSON.parse(cached).requests || [];
            renderRequests();
          }
        } catch {}
      }

      // 2. 서버에서 최신 데이터
      try {
        const data = await API.getRequests();
        allRequests = (data && data.requests) ? data.requests : [];
        localStorage.setItem('yr_requests_cache', JSON.stringify({ requests: allRequests }));
        renderRequests();
        UI.markRequestsSeen(allRequests.length);
      } catch (err) {
        if (allRequests.length > 0) return;
        document.getElementById('request-list').innerHTML = UI.empty(
          '⚠️', '로딩 실패', err.message || '요청을 불러올 수 없습니다', '다시 시도', 'requests.html'
        );
      }
    }

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(loadRequests, 60000);
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          clearInterval(pollTimer); pollTimer = null;
        } else {
          loadRequests();
          pollTimer = setInterval(loadRequests, 60000);
        }
      });
    }

    function setFilter(status) {
      currentFilter = status;
      document.querySelectorAll('.req-tab').forEach(btn => {
        const isActive = btn.dataset.status === status;
        btn.className = `req-tab flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-bold ${isActive ? 'bg-primary text-white' : 'bg-gray-100 text-gray-500'}`;
      });
      renderRequests();
    }

    function getFiltered() {
      if (currentFilter === '전체') return allRequests;
      return allRequests.filter(r => (r.status || '미처리').includes(currentFilter));
    }

    function renderRequests() {
      const container = document.getElementById('request-list');
      const filtered = getFiltered();

      if (allRequests.length === 0) {
        container.innerHTML = UI.empty('📩', '요청이 없습니다', '고객의 견적 요청이 여기에 표시됩니다');
        return;
      }
      if (filtered.length === 0) {
        container.innerHTML = '<div class="text-center py-12 text-sm text-gray-400">해당 상태의 요청이 없습니다.</div>';
        return;
      }

      container.innerHTML = filtered.map(r => {
        const phone = String(r.phone || '').replace(/^0?(\d+)/, (m, p) => {
          if (m.startsWith('0')) return m;
          return '0' + m;
        });
        const telNum = phone.replace(/-/g, '');
        const statusColor = r.status === '미처리' ? 'bg-red-100 text-red-600'
          : r.status === '완료' ? 'bg-green-100 text-green-600'
          : 'bg-blue-100 text-blue-600';
        const dateStr = r.date ? UI.formatDate(r.date) : '';
        const bizInfo = [r.bizNumber, r.bizType, r.bizItem].filter(Boolean).join(' / ');

        // 견적 작성 URL 생성
        const estimateParams = new URLSearchParams({ from: 'request', name: r.name || '', phone: phone, requestRowIndex: r.rowIndex });
        if (r.company) estimateParams.set('company', r.company);
        if (r.address) estimateParams.set('address', r.address);
        if (r.bizNumber) estimateParams.set('bizNumber', r.bizNumber);
        if (r.bizType) estimateParams.set('bizType', r.bizType);
        if (r.bizItem) estimateParams.set('bizItem', r.bizItem);

        return `
        <div class="bg-white rounded-xl border border-gray-100 p-4 mb-3">
          <div class="flex items-start justify-between mb-2">
            <div class="flex items-center gap-2">
              <span class="text-sm font-bold text-gray-800">${r.name || '미지정'}</span>
              <span class="px-2 py-0.5 rounded-full text-[11px] font-bold ${statusColor}">${r.status || '미처리'}</span>
            </div>
            <span class="text-xs text-gray-400">${dateStr}</span>
          </div>
          <div class="text-sm text-gray-600 space-y-1 mb-3">
            ${r.company ? `<p class="text-gray-500">${r.company}</p>` : ''}
            ${r.address ? `<p class="text-gray-400 text-xs">${r.address}</p>` : ''}
            <p class="text-gray-500">${r.rackType || '-'} · ${r.quantity || 0}대</p>
            ${bizInfo ? `<p class="text-gray-400 text-xs">${bizInfo}</p>` : ''}
            ${r.memo ? `<p class="text-gray-400 text-xs">${r.memo}</p>` : ''}
          </div>
          <!-- 액션 버튼 -->
          <div class="flex gap-2 mb-3">
            <a href="tel:${telNum}" onclick="handleCall(${r.rowIndex}, '${r.status || '미처리'}')"
              class="flex-1 h-10 bg-primary text-white rounded-lg text-sm font-bold flex items-center justify-center gap-1.5 active:scale-[0.98]">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              전화걸기
            </a>
            ${r.estimateId
              ? `<a href="estimate-preview.html?id=${r.estimateId}"
                  class="flex-1 h-10 bg-green-500 text-white rounded-lg text-sm font-bold flex items-center justify-center gap-1.5 active:scale-[0.98]">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                  견적서 확인
                </a>`
              : `<a href="index.html?${estimateParams.toString()}"
                  class="flex-1 h-10 bg-accent text-white rounded-lg text-sm font-bold flex items-center justify-center gap-1.5 active:scale-[0.98]">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                  견적 작성
                </a>`
            }
          </div>
          <div class="flex items-center gap-1.5 flex-wrap">
            <button onclick="toggleRequestTag(${r.rowIndex}, '연락완료')"
              class="px-2.5 py-1 rounded-full text-[11px] font-bold transition-colors ${(r.status || '').includes('연락완료') || r.status === '연락완료'
                ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-500 active:bg-gray-200'}">연락완료</button>
            <button onclick="toggleRequestTag(${r.rowIndex}, '견적발송')"
              class="px-2.5 py-1 rounded-full text-[11px] font-bold transition-colors ${(r.status || '').includes('견적발송') || r.status === '견적발송'
                ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-500 active:bg-gray-200'}">견적발송</button>
            <button onclick="changeRequestStatus(${r.rowIndex}, '완료')"
              class="px-2.5 py-1 rounded-full text-[11px] font-bold transition-colors ${r.status === '완료'
                ? 'bg-green-500 text-white' : 'bg-gray-100 text-gray-500 active:bg-gray-200'}">완료</button>
            <button onclick="handleDeleteRequest(${r.rowIndex})"
              class="ml-auto w-7 h-7 flex items-center justify-center rounded-lg text-red-400 active:bg-red-50">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </div>
        </div>`;
      }).join('');
    }

    function handleDeleteRequest(rowIndex) {
      UI.confirm('요청 삭제', '이 요청을 삭제하시겠습니까?', async () => {
        try {
          await API.deleteRequest(rowIndex);
          UI.toast('삭제되었습니다', 'success');
          await loadRequests();
        } catch { UI.toast('삭제 실패', 'error'); }
      });
    }

    function handleCall(rowIndex, currentStatus) {
      // 미처리 → 연락완료 자동 전환
      if (currentStatus === '미처리') {
        changeRequestStatus(rowIndex, '연락완료');
      } else if (!currentStatus.includes('연락완료')) {
        toggleRequestTag(rowIndex, '연락완료');
      }
    }

    async function toggleRequestTag(rowIndex, tag) {
      const item = allRequests.find(r => r.rowIndex === rowIndex);
      if (!item) return;
      const current = item.status || '미처리';
      const tags = current.split(',').map(s => s.trim()).filter(Boolean);

      if (tags.includes(tag)) {
        // 이미 있으면 제거
        const newTags = tags.filter(t => t !== tag);
        const newStatus = newTags.length > 0 ? newTags.join(',') : '미처리';
        await changeRequestStatus(rowIndex, newStatus);
      } else {
        // 없으면 추가 (미처리는 제거)
        const newTags = tags.filter(t => t !== '미처리');
        newTags.push(tag);
        await changeRequestStatus(rowIndex, newTags.join(','));
      }
    }

    async function changeRequestStatus(rowIndex, newStatus) {
      try {
        await API.updateRequestStatus(rowIndex, newStatus);
        const item = allRequests.find(r => r.rowIndex === rowIndex);
        if (item) item.status = newStatus;
        UI.toast(`'${newStatus}'로 변경되었습니다`, 'success');
        renderRequests();
        UI.markRequestsSeen(allRequests.length);
      } catch { UI.toast('상태 변경 실패', 'error'); }
    }
  </script>

  <!-- Service Worker 등록 + 자동 업데이트 -->
  <script>
    if ('serviceWorker' in navigator) {
      const hadController = !!navigator.serviceWorker.controller;
      navigator.serviceWorker.register('sw.js').then(reg => {
        if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              nw.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      }).catch(() => {});
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!hadController || refreshing) return;
        refreshing = true;
        location.reload();
      });
    }
  </script>
</body>
</html>
