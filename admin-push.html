<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 푸시 알림 설정</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#1e3a5f',accent:'#f97316'}}}}</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3a5f">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <style>body { font-family: 'Pretendard', sans-serif; }</style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({ appId: "8b75a514-0f7a-4a3f-bc61-859724940bcd", safari_web_id: "web.onesignal.auto.445d0d2a-d94a-41a6-9db5-6271b7cfba3f", serviceWorkerParam: { scope: "/" }, serviceWorkerPath: "/sw.js" });
    });
  </script>
</head>
<body class="bg-[#f7fafc] min-h-screen">

  <header class="bg-primary text-white px-4 py-4 sticky top-0 z-40 flex items-center gap-3">
    <a href="more.html" class="w-8 h-8 flex items-center justify-center rounded-lg active:bg-white/20">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <h1 class="text-lg font-bold">푸시 알림 설정</h1>
  </header>

  <main class="max-w-lg mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl border border-gray-100 p-6 text-center">
      <div class="text-5xl mb-4">🔔</div>
      <h2 class="text-lg font-bold text-gray-800 mb-2">관리자 푸시 알림 등록</h2>
      <p class="text-sm text-gray-500 mb-6">
        이 기기에서 고객 견적 요청 알림을 받으려면<br>아래 버튼을 눌러 등록하세요.
      </p>

      <div id="status-area" class="mb-6">
        <span id="status-badge" class="inline-block px-3 py-1 rounded-full text-xs font-bold bg-gray-100 text-gray-500">확인 중...</span>
      </div>

      <button id="btn-register" onclick="registerAdmin()"
        class="w-full h-14 bg-accent text-white rounded-2xl font-bold text-lg active:scale-[0.98] transition-transform mb-3">
        이 기기를 관리자로 등록하기
      </button>

      <button id="btn-unregister" onclick="unregisterAdmin()"
        class="hidden w-full h-12 bg-gray-200 text-gray-600 rounded-xl font-bold text-sm active:scale-[0.98] transition-transform">
        등록 해제
      </button>

      <button id="btn-test" onclick="testPush()"
        class="hidden w-full h-12 bg-primary text-white rounded-xl font-bold text-sm active:scale-[0.98] transition-transform mt-2">
        테스트 알림 보내기
      </button>
    </div>

    <div class="mt-6 bg-white rounded-2xl border border-gray-100 p-5">
      <h3 class="text-sm font-bold text-gray-700 mb-3">iOS 사용자 안내</h3>
      <ol class="text-xs text-gray-500 space-y-2">
        <li>1. Safari에서 이 페이지를 엽니다</li>
        <li>2. 공유 버튼 → <strong>"홈 화면에 추가"</strong>를 눌러 앱을 설치합니다</li>
        <li>3. 설치된 앱에서 이 페이지를 다시 열어 등록합니다</li>
        <li>4. 알림 허용 팝업이 뜨면 <strong>"허용"</strong>을 누릅니다</li>
      </ol>
    </div>
  </main>

  <script>
    // 상태 확인
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      updateStatus();
      OneSignal.User.PushSubscription.addEventListener('change', updateStatus);
    });

    function updateStatus() {
      OneSignalDeferred.push(async function(OneSignal) {
        const isSubscribed = OneSignal.User.PushSubscription.optedIn;
        const badge = document.getElementById('status-badge');
        const btnReg = document.getElementById('btn-register');
        const btnUnreg = document.getElementById('btn-unregister');
        const btnTest = document.getElementById('btn-test');

        if (isSubscribed) {
          badge.className = 'inline-block px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-600';
          badge.textContent = '등록됨 — 알림 수신 중';
          btnReg.classList.add('hidden');
          btnUnreg.classList.remove('hidden');
          btnTest.classList.remove('hidden');
        } else {
          badge.className = 'inline-block px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-600';
          badge.textContent = '미등록';
          btnReg.classList.remove('hidden');
          btnUnreg.classList.add('hidden');
          btnTest.classList.add('hidden');
        }
      });
    }

    function registerAdmin() {
      OneSignalDeferred.push(async function(OneSignal) {
        try {
          await OneSignal.Notifications.requestPermission();
          await OneSignal.User.PushSubscription.optIn();
          OneSignal.User.addTag("role", "admin");
          alert('이 기기가 관리자로 등록되었습니다!\n이제 견적 요청 알림을 수신합니다.');
          updateStatus();
        } catch (err) {
          alert('등록 실패: ' + (err.message || '알림 권한을 허용해주세요.'));
        }
      });
    }

    function unregisterAdmin() {
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.User.PushSubscription.optOut();
        OneSignal.User.removeTag("role");
        alert('등록이 해제되었습니다.');
        updateStatus();
      });
    }

    function testPush() {
      alert('테스트 알림은 GAS 편집기에서 testOneSignalPush 함수를 실행하세요.\n(REST API Key 보안을 위해 서버에서만 발송 가능합니다)');
    }
  </script>
</body>
</html>
