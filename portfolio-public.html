<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>중용 - 시공 포트폴리오</title>
  <meta name="description" content="중용의 랙 설치 시공 사례를 확인하세요.">
  <meta property="og:title" content="중용 - 시공 포트폴리오">
  <meta property="og:description" content="용인 랙(선반) 전문 시공 사례를 확인하세요.">
  <meta property="og:image" content="assets/og-image.jpg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#1e3a5f', accent: '#f97316' } } }
    };
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <meta name="theme-color" content="#1e3a5f">
  <style>
    body { font-family: 'Pretendard', sans-serif; padding-bottom: 80px; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-[#f7fafc] min-h-screen">

  <header class="bg-primary text-white px-4 py-4 text-center">
    <h1 class="text-lg font-bold" id="h-company">중용</h1>
    <p class="text-xs opacity-80 mt-1" id="h-tagline">용인 랙(선반) 전문 시공</p>
  </header>

  <main class="max-w-lg mx-auto px-4 py-6">
    <!-- 로딩 -->
    <div id="loading" class="space-y-3">
      <div class="animate-pulse bg-white rounded-xl border border-gray-100 overflow-hidden">
        <div class="h-44 bg-gray-200"></div>
        <div class="p-4"><div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div><div class="h-3 bg-gray-200 rounded w-1/2"></div></div>
      </div>
      <div class="animate-pulse bg-white rounded-xl border border-gray-100 overflow-hidden">
        <div class="h-44 bg-gray-200"></div>
        <div class="p-4"><div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div><div class="h-3 bg-gray-200 rounded w-1/2"></div></div>
      </div>
    </div>

    <!-- 게시글 리스트 -->
    <div id="post-list" class="hidden space-y-3"></div>

    <!-- 블로그 더보기 -->
    <div id="blog-link" class="hidden mt-6 text-center pb-4">
      <a href="https://blog.naver.com/PostList.naver?blogId=yongin_rack&from=postList&categoryNo=6&parentCategoryNo=6"
        target="_blank"
        class="inline-flex items-center gap-2 text-sm font-bold text-primary">
        <span>블로그에서 더 보기</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
      </a>
    </div>

    <!-- 빈 상태 -->
    <div id="empty-state" class="hidden text-center py-12">
      <div class="text-5xl mb-4">🏗️</div>
      <h3 class="text-lg font-bold text-gray-700 mb-2">시공 사례 준비중</h3>
      <p class="text-sm text-gray-500 mb-4">곧 시공 사진이 업로드됩니다.</p>
      <a href="https://blog.naver.com/PostList.naver?blogId=yongin_rack&from=postList&categoryNo=6&parentCategoryNo=6"
        target="_blank" class="inline-block bg-primary text-white px-6 py-3 rounded-xl font-bold text-sm">
        블로그에서 보기
      </a>
    </div>
  </main>

  <!-- 플로팅 하단 CTA -->
  <div class="fixed bottom-0 left-0 right-0 z-40" style="padding-bottom:env(safe-area-inset-bottom)">
    <div class="max-w-lg mx-auto px-4 pb-4">
      <div class="bg-primary rounded-2xl shadow-lg px-2 py-2 flex gap-1">
        <a href="tel:01037761230"
          class="flex-1 h-11 bg-white/15 rounded-xl text-white font-bold text-xs flex items-center justify-center gap-1.5 active:bg-white/25 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          전화
        </a>
        <a href="https://pf.kakao.com/_PbpFn" target="_blank"
          class="flex-1 h-11 bg-[#FEE500] rounded-xl text-[#3C1E1E] font-bold text-xs flex items-center justify-center gap-1.5 active:scale-[0.97] transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.477 3 2 6.463 2 10.691c0 2.72 1.8 5.108 4.509 6.457l-.926 3.41a.312.312 0 00.472.334l3.963-2.627c.645.09 1.306.137 1.982.137 5.523 0 10-3.463 10-7.711S17.523 3 12 3z"/></svg>
          카톡
        </a>
        <a href="request.html"
          class="flex-[1.5] h-11 bg-accent rounded-xl text-white font-bold text-sm flex items-center justify-center gap-1.5 active:scale-[0.97] transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          무료 견적 요청
        </a>
      </div>
    </div>
  </div>

  <script>
    const RSS_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https://rss.blog.naver.com/yongin_rack.xml';

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch(RSS_URL);
        const data = await res.json();
        document.getElementById('loading').classList.add('hidden');

        if (data.status !== 'ok' || !data.items || data.items.length === 0) {
          document.getElementById('empty-state').classList.remove('hidden');
          return;
        }

        const list = document.getElementById('post-list');
        list.classList.remove('hidden');
        document.getElementById('blog-link').classList.remove('hidden');

        list.innerHTML = data.items.map(post => {
          const date = post.pubDate ? new Date(post.pubDate).toLocaleDateString('ko-KR') : '';
          // description에서 HTML 태그 제거
          const desc = (post.description || '').replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ').trim();
          const shortDesc = desc.length > 80 ? desc.substring(0, 80) + '...' : desc;
          // 카테고리 추출 (categories 배열)
          const category = post.categories && post.categories[0] ? post.categories[0] : '';

          return `
            <a href="${post.link}" target="_blank" rel="noopener"
              class="block bg-white rounded-xl border border-gray-100 overflow-hidden active:bg-gray-50 transition-colors">
              ${post.thumbnail ? `
              <img src="${post.thumbnail}" alt="" class="w-full h-44 object-cover bg-gray-100"
                onerror="this.classList.add('hidden')" loading="lazy">` : ''}
              <div class="p-4">
                ${category ? `<span class="inline-block px-2 py-0.5 rounded-full text-[11px] font-bold bg-blue-50 text-primary mb-2">${category}</span>` : ''}
                <h3 class="text-sm font-bold text-gray-800 mb-1 line-clamp-2">${post.title}</h3>
                <p class="text-xs text-gray-500 line-clamp-2 mb-2">${shortDesc}</p>
                <span class="text-xs text-gray-400">${date}</span>
              </div>
            </a>
          `;
        }).join('');
      } catch {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('empty-state').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
