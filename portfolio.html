<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>포트폴리오 관리 - 용인 랙</title>
  <meta name="description" content="시공 포트폴리오 관리">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1e3a5f',
            accent: '#f97316',
          },
          fontFamily: {
            sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Pretendard Font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3a5f">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <style>
    body { font-family: 'Pretendard', sans-serif; padding-bottom: 100px; }
  </style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({ appId: "8b75a514-0f7a-4a3f-bc61-859724940bcd" });
    });
  </script>
</head>
<body class="bg-[#f7fafc] min-h-screen">

  <!-- 헤더 -->
  <header class="bg-primary text-white px-4 py-4 flex items-center gap-3 sticky top-0 z-40">
    <a href="more.html" class="w-8 h-8 flex items-center justify-center rounded-lg active:bg-white/20 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="text-lg font-bold flex-1">작업 사진 관리</h1>
  </header>

  <main class="max-w-lg mx-auto">
    <div class="mx-4 mt-4" id="portfolio-list"></div>
  </main>

  <!-- 사진 업로드 FAB -->
  <button onclick="openUploadModal()"
    class="fixed bottom-24 right-4 w-14 h-14 bg-accent text-white rounded-full shadow-lg flex items-center justify-center text-2xl font-bold active:scale-95 transition-transform z-30">
    📷
  </button>

  <!-- 업로드 모달 -->
  <div id="upload-modal" class="fixed inset-0 bg-black/50 z-50 flex items-end justify-center hidden">
    <div class="bg-white rounded-t-2xl w-full max-w-lg p-6 pb-8">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-bold text-gray-800">사진 업로드</h2>
        <button onclick="closeUploadModal()" class="text-gray-400 text-2xl">&times;</button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">사진 선택 (여러 장 가능)</label>
          <input type="file" id="f-photo" accept="image/*" multiple
            class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-sm focus:border-primary focus:outline-none file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-primary file:text-white file:font-semibold file:text-sm">
          <p class="text-xs text-gray-400 mt-1" id="file-count"></p>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">설명</label>
          <input type="text" id="f-description" placeholder="예: 경량랙 5단 20대 시공"
            class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">시공 장소</label>
          <input type="text" id="f-location" placeholder="예: 용인시 기흥구 OO물류센터"
            class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">시공 날짜</label>
          <input type="date" id="f-date"
            class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">관련 견적번호 (선택)</label>
          <input type="text" id="f-estimate-id" placeholder="YR-20260325-001"
            class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
        </div>
        <button onclick="handleUpload()" id="btn-upload"
          class="w-full h-14 bg-primary text-white rounded-xl font-bold text-lg active:scale-[0.98] transition-transform">
          업로드
        </button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.guard()) {
        window.addEventListener('yr-authenticated', init);
        return;
      }
      init();
    });

    async function init() {
      UI.renderTabBar('portfolio');
      document.getElementById('portfolio-list').innerHTML = UI.skeleton(3);
      await loadPortfolio();
    }

    async function loadPortfolio() {
      try {
        const data = await API.getPortfolio();
        const photos = (data && data.photos) ? data.photos : [];
        renderPortfolio(photos);
      } catch (err) {
        document.getElementById('portfolio-list').innerHTML = UI.empty(
          '⚠️', '로딩 실패', err.message || '포트폴리오를 불러올 수 없습니다', '다시 시도', 'portfolio.html'
        );
      }
    }

    function renderPortfolio(photos) {
      const container = document.getElementById('portfolio-list');

      if (photos.length === 0) {
        container.innerHTML = UI.empty(
          '📸', '포트폴리오가 비어있습니다', '시공 사진을 업로드하여 포트폴리오를 만드세요'
        );
        return;
      }

      container.innerHTML = photos.map(p => `
        <div class="bg-white rounded-xl border border-gray-100 overflow-hidden mb-3">
          <img src="${p.photoUrl}" alt="${p.description || '시공 사진'}"
            class="w-full h-48 object-cover bg-gray-100"
            onerror="this.parentElement.querySelector('.img-error').classList.remove('hidden');this.classList.add('hidden')">
          <div class="img-error hidden w-full h-48 bg-gray-100 flex items-center justify-center text-gray-400 text-sm">이미지를 불러올 수 없습니다</div>
          <div class="p-3">
            <p class="text-sm font-bold text-gray-800">${p.description || '시공 사진'}</p>
            <div class="flex items-center justify-between mt-1">
              <div>
                <span class="text-xs text-gray-400">${p.date || ''}</span>
                ${p.location ? `<span class="text-xs text-gray-400 ml-1">· ${p.location}</span>` : ''}
                ${p.estimateId ? `<span class="text-xs text-primary font-semibold ml-1">${p.estimateId}</span>` : ''}
              </div>
              <button onclick="handleDelete(${p.rowIndex})"
                class="w-8 h-8 flex items-center justify-center rounded-lg text-red-400 active:bg-red-50 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function handleDelete(rowIndex) {
      UI.confirm('사진 삭제', '이 사진을 삭제하시겠습니까?', async () => {
        try {
          const result = await API.deletePhoto(rowIndex);
          if (result && !result.error) {
            UI.toast('삭제되었습니다', 'success');
            await loadPortfolio();
          } else {
            UI.toast('삭제 실패', 'error');
          }
        } catch {
          UI.toast('삭제 실패', 'error');
        }
      });
    }

    function openUploadModal() {
      document.getElementById('upload-modal').classList.remove('hidden');
    }

    function closeUploadModal() {
      document.getElementById('upload-modal').classList.add('hidden');
    }

    // 파일 선택 시 개수 표시 + 날짜 기본값
    document.addEventListener('DOMContentLoaded', () => {
      const fi = document.getElementById('f-photo');
      if (fi) fi.addEventListener('change', () => {
        const cnt = fi.files.length;
        document.getElementById('file-count').textContent = cnt > 0 ? `${cnt}장 선택됨` : '';
      });
      const dateInput = document.getElementById('f-date');
      if (dateInput) dateInput.value = new Date().toISOString().slice(0, 10);
    });

    async function handleUpload() {
      const fileInput = document.getElementById('f-photo');
      const files = fileInput.files;
      if (!files || files.length === 0) {
        UI.toast('사진을 선택하세요', 'warning');
        return;
      }

      const btn = document.getElementById('btn-upload');
      UI.setLoading(btn, true);
      const description = document.getElementById('f-description').value.trim();
      const location = document.getElementById('f-location').value.trim();
      const dateVal = document.getElementById('f-date').value || new Date().toISOString().slice(0, 10);
      const estimateId = document.getElementById('f-estimate-id').value.trim();

      // 폴더명: 날짜_장소_설명 (예: 2026-03-25_용인시 기흥구_경량랙 시공)
      const parts = [dateVal];
      if (location) parts.push(location);
      if (description) parts.push(description);
      const folderName = parts.length > 1 ? parts.join('_') : `${dateVal}_시공사진`;

      let successCount = 0;
      let failCount = 0;

      try {
        for (let i = 0; i < files.length; i++) {
          UI.toast(`업로드 중... (${i + 1}/${files.length})`, 'info', 2000);
          try {
            const base64 = await fileToBase64(files[i]);
            const result = await API.uploadPhoto({
              base64Data: base64,
              filename: files[i].name,
              estimateId,
              description,
              location,
              folderName,
            });
            // result가 있고 error가 없으면 성공
            if (result && !result.error) {
              successCount++;
            } else {
              failCount++;
            }
          } catch {
            failCount++;
          }
        }

        if (successCount > 0) {
          UI.toast(`${successCount}장 업로드 완료${failCount > 0 ? ` (${failCount}장 실패)` : ''}`, 'success');
          closeUploadModal();
          fileInput.value = '';
          document.getElementById('file-count').textContent = '';
          document.getElementById('f-description').value = '';
          document.getElementById('f-location').value = '';
          document.getElementById('f-date').value = '';
          document.getElementById('f-estimate-id').value = '';
          await loadPortfolio();
        } else {
          UI.toast('업로드 실패', 'error');
        }
      } catch (err) {
        UI.toast(err.message || '업로드 실패', 'error');
      } finally {
        UI.setLoading(btn, false);
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const base64 = reader.result.split(',')[1];
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
  </script>

  <!-- Service Worker 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
