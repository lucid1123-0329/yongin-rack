<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>용인 랙 - 스마트 견적</title>
  <meta name="description" content="경량랙, 중량랙, 파렛트랙 맞춤형 최저가 견적을 즉시 확인하세요.">

  <!-- OG Tags -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="용인 랙 - 전문 시공 및 견적 시스템">
  <meta property="og:description" content="경량랙, 중량랙, 파렛트랙 맞춤형 최저가 견적을 즉시 확인하세요.">
  <meta property="og:image" content="assets/og-image.jpg">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1e3a5f',
            accent: '#f97316',
          },
          fontFamily: {
            sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Pretendard Font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3a5f">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <style>
    body { font-family: 'Pretendard', sans-serif; padding-bottom: 80px; }
    .chip { display:inline-flex; align-items:center; justify-content:center; padding:8px 14px; border-radius:9999px; font-size:13px; font-weight:600; border:2px solid #e5e7eb; color:#374151; background:#fff; cursor:pointer; transition:all 0.15s; user-select:none; }
    .chip:active { transform:scale(0.95); }
    .chip.selected { border-color:#1e3a5f; background:#1e3a5f; color:#fff; }
    .chip-form.selected { border-color:#f97316; background:#f97316; color:#fff; }
  </style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script src="js/onesignal-init.js?v=63" defer></script>
  <script src="js/version-check.js" defer></script>
</head>
<body class="bg-[#f7fafc] min-h-screen">

  <!-- 로딩 오버레이 -->
  <div id="page-loading" class="hidden fixed inset-0 bg-white z-50 flex items-center justify-center">
    <div class="text-center">
      <div class="animate-spin w-8 h-8 border-4 border-primary border-t-transparent rounded-full mx-auto mb-3"></div>
      <p class="text-sm text-gray-500" id="loading-text">불러오는 중...</p>
    </div>
  </div>
  <script>
    // HTML 파싱 중 즉시 실행 — DOMContentLoaded 기다리지 않음
    (function(){
      var p = new URLSearchParams(location.search);
      var from = p.get('from');
      if (from === 'edit' || from === 'request') {
        var el = document.getElementById('page-loading');
        var txt = document.getElementById('loading-text');
        if (el) el.classList.remove('hidden');
        if (txt) txt.textContent = from === 'edit' ? '기존 견적을 불러오는 중...' : '고객 정보를 불러오는 중...';
      }
    })();
  </script>

  <!-- 수정 모드 배너 (숨김 상태) -->
  <div id="edit-banner" class="hidden bg-amber-50 border-b-2 border-amber-400 px-4 py-3 sticky top-0 z-50">
    <div class="max-w-lg mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-amber-600 text-lg">✏️</span>
        <div>
          <p class="text-sm font-bold text-amber-800" id="edit-banner-title">견적 수정 중</p>
          <p class="text-xs text-amber-600" id="edit-banner-detail"></p>
        </div>
      </div>
      <button onclick="App.resetEstimate()" class="text-xs bg-white border border-amber-300 text-amber-700 px-3 py-1.5 rounded-lg font-semibold hover:bg-amber-50">새 견적</button>
    </div>
  </div>

  <!-- 헤더 -->
  <header class="bg-primary text-white px-4 py-4 sticky top-0 z-40">
    <div class="max-w-lg mx-auto flex items-center justify-between">
      <h1 class="text-lg font-bold" id="page-title">새 견적 작성</h1>
      <button id="btn-reset" class="hidden text-xs bg-white/20 text-white px-3 py-1.5 rounded-lg font-semibold hover:bg-white/30" onclick="App.resetEstimate()">초기화</button>
    </div>
  </header>

  <main class="max-w-lg mx-auto">
    <!-- 금액 카드 -->
    <div class="mx-4 mt-4 bg-gradient-to-br from-primary to-[#2c5282] rounded-2xl p-5 text-white">
      <div class="text-center">
        <p class="text-sm opacity-80">총 견적액 (VAT 포함)</p>
        <p class="text-3xl font-extrabold my-1" id="total-amount">0원</p>
        <p class="text-xs opacity-70" id="total-detail">항목을 추가하세요</p>
      </div>
      <div class="flex justify-between mt-3 pt-3 border-t border-white/20 text-xs opacity-80">
        <span>공급가액: <span id="supply-amount">0원</span></span>
        <span>세액(10%): <span id="vat-amount">0원</span></span>
      </div>
    </div>

    <!-- 랙 추가 영역 -->
    <div class="mx-4 mt-4 bg-white rounded-2xl border border-gray-100 p-4" id="price-area">
      <h3 class="text-sm font-bold text-gray-700 mb-3">랙 추가</h3>
      <div id="rack-selector">
        <div class="text-center py-8">
          <div class="animate-pulse">
            <div class="h-4 bg-gray-200 rounded w-1/2 mx-auto mb-3"></div>
            <div class="h-12 bg-gray-200 rounded mb-3"></div>
          </div>
        </div>
      </div>

      <!-- 수량 + 추가 버튼 (랙 선택 완료 시 표시) -->
      <div class="mt-3 hidden" id="add-section">
        <div class="flex items-end gap-3">
          <div class="flex-1">
            <label class="block text-sm font-semibold text-gray-600 mb-2">수량</label>
            <div class="flex items-center">
              <button onclick="App.changeQuantity(-1)" class="w-10 h-10 bg-gray-100 rounded-l-xl text-lg font-bold text-gray-600 active:bg-gray-200">−</button>
              <input type="number" id="qty-input" value="1" min="1" max="9999"
                class="w-16 h-10 text-center text-base font-bold border-y-2 border-gray-200 focus:outline-none"
                onchange="App.setQuantity(this.value)">
              <button onclick="App.changeQuantity(1)" class="w-10 h-10 bg-gray-100 rounded-r-xl text-lg font-bold text-gray-600 active:bg-gray-200">+</button>
              <span class="ml-2 text-sm text-gray-500">대</span>
            </div>
          </div>
          <button onclick="App.addItem()"
            class="h-10 px-5 bg-accent text-white rounded-xl font-bold text-sm active:scale-[0.98] transition-transform flex-shrink-0">
            + 추가
          </button>
        </div>
      </div>
    </div>

    <!-- 추가된 품목 목록 -->
    <div class="mx-4 mt-4" id="items-area"></div>

    <!-- 추가 항목 (운송비, 설치비, 마진, D/C) -->
    <div class="mx-4 mt-4 bg-white rounded-2xl border border-gray-100 p-4">
      <h3 class="text-sm font-bold text-gray-700 mb-3">추가 항목</h3>
      <div class="grid grid-cols-4 gap-2 mb-3">
        <button onclick="App.addPresetItem('운송비')" class="py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 active:bg-gray-200">+ 운송비</button>
        <button onclick="App.addPresetItem('설치비')" class="py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 active:bg-gray-200">+ 설치비</button>
        <button onclick="App.addPresetItem('마진')" class="py-1.5 rounded-full text-xs font-bold bg-blue-50 text-blue-600 active:bg-blue-100">+ 마진</button>
        <button onclick="App.addPresetItem('D/C')" class="py-1.5 rounded-full text-xs font-bold bg-red-50 text-red-500 active:bg-red-100">+ D/C</button>
      </div>

      <!-- 마진 % 입력 영역 (토글) -->
      <div id="margin-area" class="hidden mb-3 bg-blue-50 rounded-xl p-3">
        <p class="text-xs font-bold text-blue-700 mb-2">마진율 설정</p>
        <div class="flex items-center gap-2">
          <input id="margin-pct" type="number" value="25" min="1" max="100"
            oninput="App.calcMarginFromPct()"
            class="w-20 h-10 px-3 border-2 border-blue-200 rounded-lg text-sm text-center font-bold focus:border-blue-500 focus:outline-none">
          <span class="text-sm font-bold text-blue-600">%</span>
          <span class="text-sm text-gray-500 mx-1">=</span>
          <span id="margin-amount" class="text-sm font-extrabold text-blue-700" data-amount="0">0원</span>
          <button onclick="App.addMargin()"
            class="ml-auto h-10 px-4 bg-blue-600 text-white rounded-lg text-sm font-bold active:scale-[0.98]">추가</button>
        </div>
        <p class="text-[11px] text-blue-400 mt-1">랙 품목 소계 기준으로 자동 계산됩니다</p>
      </div>

      <!-- D/C 할인 입력 영역 (토글) -->
      <div id="dc-area" class="hidden mb-3 bg-red-50 rounded-xl p-3">
        <p class="text-xs font-bold text-red-600 mb-2">할인(D/C) 금액</p>
        <div class="flex items-center gap-2">
          <span class="text-sm font-bold text-red-500">-</span>
          <input id="dc-amount" type="number" placeholder="할인 금액" min="1"
            class="flex-1 min-w-0 h-10 px-3 border-2 border-red-200 rounded-lg text-sm font-bold focus:border-red-400 focus:outline-none">
          <span class="text-sm text-gray-500 shrink-0">원</span>
          <button onclick="App.addDiscount()"
            class="h-10 px-4 bg-red-500 text-white rounded-lg text-sm font-bold active:scale-[0.98] shrink-0">적용</button>
        </div>
        <p class="text-[11px] text-red-400 mt-1">양수로 입력하면 자동으로 차감됩니다</p>
      </div>

      <div class="space-y-2">
        <input id="custom-name" placeholder="항목명" class="w-full h-10 px-3 border-2 border-gray-200 rounded-lg text-sm focus:border-primary focus:outline-none">
        <div class="flex gap-2">
          <input id="custom-price" type="number" placeholder="금액" class="flex-1 min-w-0 h-10 px-3 border-2 border-gray-200 rounded-lg text-sm focus:border-primary focus:outline-none">
          <input id="custom-qty" type="number" value="1" min="1" class="w-14 h-10 px-2 border-2 border-gray-200 rounded-lg text-sm text-center focus:border-primary focus:outline-none">
          <button onclick="App.addCustomItem()" class="h-10 px-3 bg-accent text-white rounded-lg text-sm font-bold active:scale-[0.98]">추가</button>
        </div>
      </div>
      <p class="text-[11px] text-gray-400 mt-1.5">* 기타 항목을 자유롭게 추가할 수 있습니다</p>
    </div>

    <!-- 고객 정보 (접이식) -->
    <div class="mx-4 mt-4 bg-white rounded-2xl border border-gray-100 overflow-hidden">
      <button onclick="document.getElementById('customer-form').classList.toggle('hidden');this.querySelector('span:last-child').textContent=document.getElementById('customer-form').classList.contains('hidden')?'▼':'▲'"
        class="w-full px-4 py-3 flex items-center justify-between text-sm font-semibold text-gray-700">
        <span>고객 정보 (선택)</span>
        <span class="text-gray-400">▼</span>
      </button>
      <div id="customer-form" class="hidden px-4 pb-4 space-y-3">
        <div>
          <label for="cust-name" class="block text-xs font-semibold text-gray-500 mb-1">고객명/상호</label>
          <input type="text" id="cust-name" placeholder="홍길동" autocomplete="off"
            class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none"
            list="customer-suggestions">
          <datalist id="customer-suggestions"></datalist>
        </div>
        <div>
          <label for="cust-company" class="block text-xs font-semibold text-gray-500 mb-1">회사명</label>
          <input type="text" id="cust-company" placeholder="우리물류"
            class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
        </div>
        <div>
          <label for="cust-phone" class="block text-xs font-semibold text-gray-500 mb-1">연락처</label>
          <input type="tel" id="cust-phone" placeholder="010-0000-0000"
            class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
        </div>
        <div>
          <label for="cust-address" class="block text-xs font-semibold text-gray-500 mb-1">현장 주소</label>
          <input type="text" id="cust-address" placeholder="용인시 처인구..."
            class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
        </div>
        <div>
          <label for="cust-biz-number" class="block text-xs font-semibold text-gray-500 mb-1">사업자등록번호</label>
          <input type="text" id="cust-biz-number" placeholder="000-00-00000"
            class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label for="cust-biz-type" class="block text-xs font-semibold text-gray-500 mb-1">업태</label>
            <input type="text" id="cust-biz-type" placeholder="제조업"
              class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
          </div>
          <div>
            <label for="cust-biz-item" class="block text-xs font-semibold text-gray-500 mb-1">종목</label>
            <input type="text" id="cust-biz-item" placeholder="식품"
              class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
          </div>
        </div>
      </div>
    </div>

    <!-- 저장 버튼 -->
    <div class="mx-4 mt-4 mb-6">
      <button id="btn-save" disabled
        onclick="handleSave()"
        class="w-full h-14 bg-primary text-white rounded-2xl font-bold text-lg disabled:opacity-40 active:scale-[0.98] transition-transform">
        견적 저장
      </button>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/api.js?v=63"></script>
  <script src="js/auth.js?v=63"></script>
  <script src="js/ui.js?v=63"></script>
  <script src="js/app.js?v=63"></script>
  <script src="js/estimate.js?v=63"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!Auth.guard()) {
        window.addEventListener('yr-authenticated', init);
        return;
      }
      init();
    });

    async function init() {
      UI.renderTabBar('estimate');
      await App.loadPrices();
      loadCustomerSuggestions();

      // 임시 저장 복원
      const draft = App.loadDraft();
      if (draft) {
        if (draft.items && draft.items.length > 0) {
          App.items = draft.items;
          App.renderItems();
          App.updateTotal();
        }
        if (draft.customer) {
          if (draft.customer.name) document.getElementById('cust-name').value = draft.customer.name;
          if (draft.customer.company) document.getElementById('cust-company').value = draft.customer.company;
          if (draft.customer.phone) document.getElementById('cust-phone').value = draft.customer.phone;
          if (draft.customer.address) document.getElementById('cust-address').value = draft.customer.address;
          if (draft.customer.bizNumber) document.getElementById('cust-biz-number').value = draft.customer.bizNumber;
          if (draft.customer.bizType) document.getElementById('cust-biz-type').value = draft.customer.bizType;
          if (draft.customer.bizItem) document.getElementById('cust-biz-item').value = draft.customer.bizItem;
        }
      }

      // 수정 모드가 sessionStorage에 남아있으면 배너 복원
      const pendingEditId = sessionStorage.getItem('yr_edit_id');
      if (pendingEditId) {
        const custName = document.getElementById('cust-name')?.value || '';
        showEditBanner(pendingEditId, custName);
        document.getElementById('btn-save').textContent = '견적 수정 저장';
      }

      // URL 파라미터로 고객정보 프리필 (요청→견적)
      await prefillFromUrl();
    }

    async function prefillFromUrl() {
      const p = new URLSearchParams(location.search);
      const from = p.get('from');

      // 수정 모드: 기존 견적 데이터 로드
      if (from === 'edit' && p.get('editId')) {
        sessionStorage.setItem('yr_edit_id', p.get('editId'));
        try {
          const data = await API.getEstimate(p.get('editId'));
          if (data && !data.error) {
            // 고객 정보 채우기
            if (data.customerName) document.getElementById('cust-name').value = data.customerName;
            if (data.company) document.getElementById('cust-company').value = data.company;
            if (data.phone) document.getElementById('cust-phone').value = data.phone;
            if (data.address) document.getElementById('cust-address').value = data.address;
            if (data.bizNumber) document.getElementById('cust-biz-number').value = data.bizNumber;
            if (data.bizType) document.getElementById('cust-biz-type').value = data.bizType;
            if (data.bizItem) document.getElementById('cust-biz-item').value = data.bizItem;
            document.getElementById('customer-form').classList.remove('hidden');
            // 품목 채우기
            const items = typeof data.items === 'string' ? JSON.parse(data.items) : (data.items || []);
            if (items.length > 0) {
              App.items = items;
              App.renderItems();
              App.updateTotal();
            }
            document.getElementById('btn-save').textContent = '견적 수정 저장';
            // 수정 모드 배너 표시
            showEditBanner(p.get('editId'), data.customerName);
            UI.toast('기존 견적을 불러왔습니다. 수정 후 저장하세요.', 'info', 3000);
          }
        } catch {}
        document.getElementById('page-loading').classList.add('hidden');
        history.replaceState(null, '', location.pathname);
        return;
      }

      // 요청→견적 프리필
      if (from !== 'request') return;
      const fields = { name:'cust-name', company:'cust-company', phone:'cust-phone', address:'cust-address',
        bizNumber:'cust-biz-number', bizType:'cust-biz-type', bizItem:'cust-biz-item' };
      let filled = false;
      for (const [key, id] of Object.entries(fields)) {
        const val = p.get(key);
        if (val) { document.getElementById(id).value = val; filled = true; }
      }
      if (filled) {
        document.getElementById('customer-form').classList.remove('hidden');
      }
      // requestRowIndex 저장 (공유 시 자동 상태 전환용)
      const reqRow = p.get('requestRowIndex');
      if (reqRow) sessionStorage.setItem('yr_request_row', reqRow);
      document.getElementById('page-loading').classList.add('hidden');
      // URL 정리
      history.replaceState(null, '', location.pathname);
    }

    async function handleSave() {
      const btn = document.getElementById('btn-save');
      UI.setLoading(btn, true);
      try {
        const editId = sessionStorage.getItem('yr_edit_id');
        console.log('handleSave mode:', editId ? 'UPDATE ' + editId : 'NEW');

        if (editId) {
          // 수정 모드: 기존 견적 업데이트
          const { supplyTotal, vat, total, items: calcItems } = App.calculate();
          if (!calcItems || calcItems.length === 0) {
            UI.toast('품목을 추가하세요', 'warning');
            return;
          }
          const customer = App.getCustomerInfo();
          const result = await API.updateEstimate({
            estimateId: editId,
            items: calcItems,
            supplyTotal, vat, total,
            ...customer,
          });
          console.log('updateEstimate result:', result);
          if (result && (result.estimateId || result.result === 'success')) {
            sessionStorage.removeItem('yr_edit_id');
            sessionStorage.removeItem('yr-estimate-' + editId);
            UI.toast('견적이 수정되었습니다', 'success');
            window.location.href = `estimate-preview.html?id=${result.estimateId || editId}`;
          } else {
            UI.toast('수정 실패: ' + (result?.error || '알 수 없는 오류'), 'error');
          }
        } else {
          // 신규 저장
          const result = await App.saveEstimate();
          if (result && result.estimateId) {
            UI.toast('견적이 저장되었습니다', 'success');
            const reqRow = sessionStorage.getItem('yr_request_row');
            if (reqRow) {
              try { await API.linkEstimateToRequest(Number(reqRow), result.estimateId); } catch {}
            }
            const reqParam = reqRow ? `&requestRowIndex=${reqRow}` : '';
            sessionStorage.removeItem('yr_request_row');
            window.location.href = `estimate-preview.html?id=${result.estimateId}${reqParam}`;
          }
        }
      } catch (err) {
        UI.toast(err.message || '저장 실패', 'error');
      } finally {
        UI.setLoading(btn, false);
      }
    }

    function showEditBanner(editId, customerName) {
      const banner = document.getElementById('edit-banner');
      const title = document.getElementById('edit-banner-title');
      const detail = document.getElementById('edit-banner-detail');
      const pageTitle = document.getElementById('page-title');
      const btnReset = document.getElementById('btn-reset');
      if (banner) {
        banner.classList.remove('hidden');
        title.textContent = `${customerName || '고객'} 견적 수정 중`;
        detail.textContent = editId || '';
        pageTitle.textContent = '견적 수정';
        btnReset.classList.remove('hidden');
      }
    }

    function updateResetButton() {
      const btnReset = document.getElementById('btn-reset');
      const editId = sessionStorage.getItem('yr_edit_id');
      if (!editId && App.items && App.items.length > 0) {
        btnReset.classList.remove('hidden');
      }
    }

    async function loadCustomerSuggestions() {
      try {
        const data = await API.getEstimates();
        if (data && data.estimates) {
          const seen = new Set();
          const datalist = document.getElementById('customer-suggestions');
          data.estimates.forEach(e => {
            if (e.customerName && !seen.has(e.customerName)) {
              seen.add(e.customerName);
              const opt = document.createElement('option');
              opt.value = e.customerName;
              datalist.appendChild(opt);
            }
          });

          document.getElementById('cust-name').addEventListener('change', (ev) => {
            const match = data.estimates.find(e => e.customerName === ev.target.value);
            if (match) {
              document.getElementById('cust-company').value = match.company || '';
              document.getElementById('cust-phone').value = match.phone || '';
              document.getElementById('cust-address').value = match.address || '';
            }
          });
        }
      } catch {}
    }
  </script>

  <script src="js/sw-register.js"></script>
</body>
</html>
