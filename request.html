<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>중용 - 견적 요청</title>
  <meta name="description" content="경량랙, 중량랙 설치 견적을 무료로 요청하세요.">
  <meta property="og:title" content="중용 - 무료 견적 요청">
  <meta property="og:description" content="용인 랙(선반) 전문 시공, 무료 견적을 요청하세요.">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#1e3a5f', accent: '#f97316' } } }
    };
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <meta name="theme-color" content="#1e3a5f">
  <style>
    body { font-family: 'Pretendard', sans-serif; padding-bottom: 80px; }
  </style>
  <script src="js/version-check.js" defer></script>
</head>
<body class="bg-[#f7fafc] min-h-screen">

  <header class="bg-primary text-white px-4 py-4 text-center">
    <h1 class="text-lg font-bold" id="h-company">중용</h1>
    <p class="text-xs opacity-80 mt-1" id="h-tagline">용인 랙(선반) 전문 시공</p>
  </header>

  <main class="max-w-lg mx-auto px-4 py-6">
    <div class="bg-white rounded-2xl border border-gray-100 p-5">
      <h2 class="text-xl font-bold text-gray-800 mb-1">견적 요청</h2>
      <p class="text-sm text-gray-500 mb-6">아래 정보를 입력하시면 담당자가 확인 후 연락드리겠습니다.</p>

      <form id="request-form" class="space-y-4">
        <div>
          <label for="req-name" class="block text-sm font-semibold text-gray-600 mb-1">이름/상호 *</label>
          <input type="text" id="req-name" required
            class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none"
            placeholder="홍길동">
        </div>
        <div>
          <label for="req-phone" class="block text-sm font-semibold text-gray-600 mb-1">연락처 *</label>
          <input type="tel" id="req-phone" required
            class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none"
            placeholder="010-0000-0000">
        </div>
        <div>
          <label for="req-address" class="block text-sm font-semibold text-gray-600 mb-1">현장 주소</label>
          <input type="text" id="req-address"
            class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none"
            placeholder="용인시 처인구... (선택사항)">
        </div>
        <div>
          <label for="req-rack" class="block text-sm font-semibold text-gray-600 mb-1">필요한 랙 종류</label>
          <select id="req-rack"
            class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base bg-white focus:border-primary focus:outline-none">
            <option value="">선택하세요 (선택사항)</option>
            <option>경량랙</option>
            <option>중량랙</option>
            <option>파렛트랙</option>
            <option>무볼트 앵글</option>
            <option>곤도라 진열대</option>
            <option>하이퍼 진열대</option>
            <option>기타</option>
          </select>
        </div>
        <div>
          <label for="req-qty" class="block text-sm font-semibold text-gray-600 mb-1">예상 수량</label>
          <input type="number" id="req-qty" min="1"
            class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none"
            placeholder="10">
        </div>
        <div>
          <label for="req-memo" class="block text-sm font-semibold text-gray-600 mb-1">추가 요청사항</label>
          <textarea id="req-memo" rows="3"
            class="w-full px-3 py-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none resize-none"
            placeholder="설치 위치, 특수 요구사항 등"></textarea>
        </div>

        <!-- 현장 정보 (선택) -->
        <details class="mb-4">
          <summary class="text-sm font-bold text-gray-600 cursor-pointer">현장 정보 (선택) <span class="font-normal text-gray-400">— 아는 만큼만 입력하세요</span></summary>
          <div class="mt-3 space-y-3">
            <div class="grid grid-cols-3 gap-2">
              <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">가로(m)</label>
                <input type="number" id="req-space-width" step="0.1" placeholder="10"
                  class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">세로(m)</label>
                <input type="number" id="req-space-depth" step="0.1" placeholder="20"
                  class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">높이(m)</label>
                <input type="number" id="req-space-height" step="0.1" placeholder="5"
                  class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">용도/환경</label>
              <select id="req-space-purpose"
                class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none bg-white">
                <option value="">선택하세요</option>
                <option>창고</option>
                <option>냉동/냉장</option>
                <option>매장/진열</option>
                <option>사무실/복도</option>
                <option>공장/제조</option>
                <option>물류센터</option>
                <option>기타</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">보관물 정보</label>
              <div class="grid grid-cols-2 gap-2">
                <input type="text" id="req-cargo-type" placeholder="물건 종류 (예: 식품 박스)"
                  class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-sm focus:border-primary focus:outline-none">
                <select id="req-cargo-weight"
                  class="w-full h-12 px-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none bg-white">
                  <option value="">무게</option>
                  <option>가벼움 (~10kg)</option>
                  <option>보통 (10~30kg)</option>
                  <option>무거움 (30kg~)</option>
                </select>
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">현장 사진</label>
              <input type="file" id="req-space-photo" accept="image/*" capture="environment"
                class="w-full text-sm text-gray-500 file:mr-2 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-primary file:text-white file:font-bold">
              <img id="req-space-photo-preview" class="hidden mt-2 rounded-lg max-h-48 w-full object-cover">
            </div>
          </div>
        </details>

        <!-- 사업자 정보 (선택) -->
        <details class="mb-4">
          <summary class="text-sm font-bold text-gray-600 cursor-pointer">사업자 정보 (선택)</summary>
          <div class="mt-2 space-y-2">
            <input id="req-company" type="text" placeholder="회사명/상호"
              class="w-full px-3 py-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
            <input id="req-biz-number" type="text" placeholder="사업자등록번호"
              class="w-full px-3 py-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
            <div class="grid grid-cols-2 gap-2">
              <input id="req-biz-type" type="text" placeholder="업태"
                class="w-full px-3 py-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
              <input id="req-biz-item" type="text" placeholder="종목"
                class="w-full px-3 py-3 border-2 border-gray-200 rounded-lg text-base focus:border-primary focus:outline-none">
            </div>
          </div>
        </details>

        <!-- 허니팟 (스팸 방지) -->
        <input type="text" name="website" class="hidden" tabindex="-1" autocomplete="off">

        <button type="submit" id="btn-submit"
          class="w-full h-14 bg-accent text-white rounded-2xl font-bold text-lg active:scale-[0.98] transition-transform">
          견적 요청하기
        </button>
      </form>

      <!-- 성공 메시지 -->
      <div id="success-msg" class="hidden text-center py-8">
        <div class="text-5xl mb-4">✅</div>
        <h3 class="text-lg font-bold text-gray-800 mb-2">요청이 접수되었습니다!</h3>
        <p class="text-sm text-gray-500">담당자가 확인 후 연락드리겠습니다.</p>
      </div>
    </div>
  </main>

  <!-- 플로팅 하단 CTA -->
  <div class="fixed bottom-0 left-0 right-0 z-40" style="padding-bottom:env(safe-area-inset-bottom)">
    <div class="max-w-lg mx-auto px-4 pb-4">
      <div class="bg-primary rounded-2xl shadow-lg px-2 py-2 flex gap-1">
        <a href="portfolio-public.html"
          class="flex-1 h-11 bg-white/15 rounded-xl text-white font-bold text-xs flex items-center justify-center gap-1.5 active:bg-white/25 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          시공사례
        </a>
        <a href="tel:01037761230"
          class="flex-1 h-11 bg-white/15 rounded-xl text-white font-bold text-xs flex items-center justify-center gap-1.5 active:bg-white/25 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          전화
        </a>
        <a href="https://pf.kakao.com/_PbpFn" target="_blank"
          class="flex-1 h-11 bg-[#FEE500] rounded-xl text-[#3C1E1E] font-bold text-xs flex items-center justify-center gap-1.5 active:scale-[0.97] transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.477 3 2 6.463 2 10.691c0 2.72 1.8 5.108 4.509 6.457l-.926 3.41a.312.312 0 00.472.334l3.963-2.627c.645.09 1.306.137 1.982.137 5.523 0 10-3.463 10-7.711S17.523 3 12 3z"/></svg>
          카톡
        </a>
      </div>
    </div>
  </div>

  <script src="js/api.js?v=64"></script>
  <script src="js/ui.js?v=64"></script>
  <script>
    // 현장 사진 미리보기
    document.getElementById('req-space-photo').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        var preview = document.getElementById('req-space-photo-preview');
        preview.src = ev.target.result;
        preview.classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    });

    function resizeAndEncode(file, maxSize) {
      return new Promise(function(resolve) {
        var img = new Image();
        img.onload = function() {
          var canvas = document.createElement('canvas');
          var w = img.width, h = img.height;
          if (w > maxSize || h > maxSize) {
            var ratio = Math.min(maxSize / w, maxSize / h);
            w = Math.round(w * ratio);
            h = Math.round(h * ratio);
          }
          canvas.width = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          var dataUrl = canvas.toDataURL('image/jpeg', 0.8);
          resolve({ data: dataUrl.split(',')[1], mimeType: 'image/jpeg' });
        };
        img.src = URL.createObjectURL(file);
      });
    }

    document.getElementById('request-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      // 허니팟 체크
      if (document.querySelector('[name="website"]').value) return;

      const btn = document.getElementById('btn-submit');
      function _sf(val, max) { return String(val || '').trim().slice(0, max || 100); }
      const name = _sf(document.getElementById('req-name').value, 50);
      const phone = _sf(document.getElementById('req-phone').value, 20);

      if (!name || !phone) {
        UI.toast('이름과 연락처를 입력하세요', 'warning');
        return;
      }

      UI.setLoading(btn, true);
      try {
        // 현장 사진 인코딩
        const photoInput = document.getElementById('req-space-photo');
        let photoData = null;
        if (photoInput.files[0]) {
          photoData = await resizeAndEncode(photoInput.files[0], 1024);
        }

        const result = await API.submitRequest({
          name,
          phone,
          company: _sf(document.getElementById('req-company')?.value, 50),
          address: _sf(document.getElementById('req-address')?.value, 200),
          rackType: _sf(document.getElementById('req-rack').value, 30),
          quantity: _sf(document.getElementById('req-qty').value, 10),
          memo: _sf(document.getElementById('req-memo').value, 500),
          bizNumber: _sf(document.getElementById('req-biz-number')?.value, 20),
          bizType: _sf(document.getElementById('req-biz-type')?.value, 30),
          bizItem: _sf(document.getElementById('req-biz-item')?.value, 30),
          spaceWidth: _sf(document.getElementById('req-space-width')?.value, 10),
          spaceDepth: _sf(document.getElementById('req-space-depth')?.value, 10),
          spaceHeight: _sf(document.getElementById('req-space-height')?.value, 10),
          spacePurpose: _sf(document.getElementById('req-space-purpose')?.value, 30),
          cargoType: _sf(document.getElementById('req-cargo-type')?.value, 50),
          cargoWeight: _sf(document.getElementById('req-cargo-weight')?.value, 20),
          ...(photoData ? { imageBase64: photoData.data, imageMimeType: photoData.mimeType } : {}),
        });

        if (result.error) {
          UI.toast(result.error, 'error');
        } else {
          document.getElementById('request-form').classList.add('hidden');
          document.getElementById('success-msg').classList.remove('hidden');
          // 푸시 알림은 GAS에서 OneSignal로 직접 발송
        }
      } catch (err) {
        UI.toast(err.message || '요청 실패', 'error');
      } finally {
        UI.setLoading(btn, false);
      }
    });

  </script>
</body>
</html>
