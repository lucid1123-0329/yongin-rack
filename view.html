<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>견적서 확인 - 중용</title>
  <meta property="og:title" content="[중용] 맞춤형 견적서가 도착했습니다">
  <meta property="og:description" content="용인 랙(선반) 전문 시공 견적서를 확인하세요.">
  <meta property="og:image" content="assets/og-image.jpg">
  <meta property="og:type" content="website">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#1e3a5f',accent:'#f97316'}}}}</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas-pro@1.5.8/dist/html2canvas-pro.min.js"></script>
  <style>
    body{font-family:'Pretendard',sans-serif;padding-bottom:80px}
    .a4-wrapper{width:700px;transform-origin:top left}
    .a4-container{overflow:hidden}
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- 로딩 -->
  <div id="loading" class="min-h-screen flex items-center justify-center">
    <div class="text-center px-6">
      <div class="animate-spin w-8 h-8 border-4 border-primary border-t-transparent rounded-full mx-auto mb-4"></div>
      <p class="text-sm text-gray-500">견적서를 불러오는 중...</p>
    </div>
  </div>

  <!-- 견적서 영역 -->
  <div id="estimate-page" class="hidden py-4">
    <div class="max-w-2xl mx-4 sm:mx-auto a4-container" id="preview-container">
      <div id="preview-area" class="a4-wrapper"></div>

      <!-- 이미지 저장 버튼 -->
      <div class="mt-4 text-center">
        <button onclick="downloadImg()"
          class="inline-flex items-center gap-2 px-6 py-3 bg-white border-2 border-gray-200 rounded-xl font-bold text-sm text-gray-700 active:scale-[0.98] transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V3"/></svg>
          이미지 저장
        </button>
      </div>
    </div>
  </div>

  <!-- 플로팅 하단 CTA -->
  <div class="fixed bottom-0 left-0 right-0 z-40" style="padding-bottom:env(safe-area-inset-bottom)">
    <div class="max-w-lg mx-auto px-4 pb-4">
      <div class="bg-primary rounded-2xl shadow-lg px-2 py-2 flex gap-1">
        <a href="portfolio-public.html"
          class="flex-1 h-11 bg-white/15 rounded-xl text-white font-bold text-xs flex items-center justify-center gap-1.5 active:bg-white/25 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          시공사례
        </a>
        <a href="tel:01037761230"
          class="flex-1 h-11 bg-white/15 rounded-xl text-white font-bold text-xs flex items-center justify-center gap-1.5 active:bg-white/25 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          전화
        </a>
        <a href="https://pf.kakao.com/_PbpFn" target="_blank"
          class="flex-1 h-11 bg-[#FEE500] rounded-xl text-[#3C1E1E] font-bold text-xs flex items-center justify-center gap-1.5 active:scale-[0.97] transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.477 3 2 6.463 2 10.691c0 2.72 1.8 5.108 4.509 6.457l-.926 3.41a.312.312 0 00.472.334l3.963-2.627c.645.09 1.306.137 1.982.137 5.523 0 10-3.463 10-7.711S17.523 3 12 3z"/></svg>
          카톡
        </a>
        <a href="request.html"
          class="flex-[1.5] h-11 bg-accent rounded-xl text-white font-bold text-sm flex items-center justify-center gap-1.5 active:scale-[0.97] transition-transform">
          견적 요청
        </a>
      </div>
    </div>
  </div>

  <!-- 에러 -->
  <div id="error-page" class="hidden min-h-screen flex items-center justify-center">
    <div class="text-center px-6">
      <div class="text-5xl mb-4">📋</div>
      <p class="text-lg font-bold text-gray-700 mb-2">견적서를 찾을 수 없습니다</p>
      <p class="text-sm text-gray-500 mb-6">링크가 올바른지 확인해주세요.</p>
      <a href="request.html" class="inline-block bg-primary text-white px-6 py-3 rounded-xl font-bold text-sm">견적 요청하기</a>
    </div>
  </div>

  <script src="js/api.js?v=53"></script>
  <script src="js/ui.js?v=53"></script>
  <script src="js/estimate.js?v=53"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(location.search);
      const token = params.get('token');
      const id = params.get('id');

      if (!token && !id) { showError(); return; }

      try {
        let data;
        if (token) {
          // 토큰 기반 조회 (보안 URL)
          data = await API.getEstimateByToken(token);
        } else {
          // 기존 ID 기반 조회 (하위호환)
          data = await API.getEstimate(id);
          data.docType = params.get('doc') || 'formal';
          data.hideMargin = params.get('hideMargin') === '1';
        }
        if (!data || data.error) { showError(); return; }
        data.estimateId = data.estimateId || id;
        render(data);
      } catch {
        showError();
      }
    });

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('estimate-page').classList.remove('hidden');

      const previewEl = document.getElementById('preview-area');
      const containerEl = document.getElementById('preview-container');
      const docType = data.docType || 'formal';
      const opts = data.hideMargin ? { hideMargin: true } : undefined;

      if (docType === 'transaction') {
        previewEl.innerHTML = Estimate.renderTransactionStatement(data, opts);
        document.title = `[중용] 거래명세표 - ${data.estimateId}`;
      } else {
        previewEl.innerHTML = Estimate.renderFormalQuotation(data, opts);
        document.title = `[중용] 견적서 - ${data.estimateId}`;
      }

      // A4 스케일 적용
      requestAnimationFrame(() => {
        const containerW = containerEl.clientWidth;
        const docW = 700;
        const scale = Math.min(1, containerW / docW);
        previewEl.style.transform = `scale(${scale})`;
        containerEl.style.height = (previewEl.scrollHeight * scale) + 'px';
      });
    }

    function showError() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error-page').classList.remove('hidden');
    }

    async function downloadImg() {
      const card = document.getElementById('estimate-card');
      if (!card || typeof html2canvas === 'undefined') return;
      try {
        const canvas = await html2canvas(card, { scale: 2, backgroundColor: '#fff', useCORS: true });
        const link = document.createElement('a');
        link.download = '견적서_' + new Date().toISOString().slice(0,10) + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch {}
    }
  </script>
</body>
</html>
