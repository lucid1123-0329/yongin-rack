<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>견적서 미리보기 - 용인 랙</title>
  <meta name="description" content="경량랙, 중량랙, 파렛트랙 맞춤형 최저가 견적을 즉시 확인하세요.">

  <!-- OG Tags -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="용인 랙 - 견적서 미리보기">
  <meta property="og:description" content="경량랙, 중량랙, 파렛트랙 맞춤형 최저가 견적을 즉시 확인하세요.">
  <meta property="og:image" content="assets/og-image.jpg">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1e3a5f',
            accent: '#f97316',
          },
          fontFamily: {
            sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Pretendard Font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3a5f">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <!-- html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <!-- MVP: Web Share API 사용 (카카오 SDK 불필요) -->

  <style>
    body { font-family: 'Pretendard', sans-serif; padding-bottom: env(safe-area-inset-bottom, 24px); }
  </style>
</head>
<body class="bg-[#f7fafc] min-h-screen pb-20">

  <!-- 헤더 -->
  <header class="bg-primary text-white px-4 py-4 flex items-center gap-3">
    <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center rounded-lg active:bg-white/20 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>
    <h1 class="text-lg font-bold">견적서 미리보기</h1>
  </header>

  <main class="max-w-lg mx-auto">
    <!-- 로딩 상태 -->
    <div id="loading-state" class="mx-4 mt-6">
      <div class="bg-white rounded-2xl border border-gray-100 p-6 animate-pulse">
        <div class="h-5 bg-gray-200 rounded w-1/3 mx-auto mb-4"></div>
        <div class="h-8 bg-gray-200 rounded w-2/3 mx-auto mb-6"></div>
        <div class="space-y-3">
          <div class="h-4 bg-gray-200 rounded w-full"></div>
          <div class="h-4 bg-gray-200 rounded w-5/6"></div>
          <div class="h-4 bg-gray-200 rounded w-4/6"></div>
        </div>
      </div>
    </div>

    <!-- 에러 상태 -->
    <div id="error-state" class="mx-4 mt-6 hidden">
      <div class="bg-white rounded-2xl border border-red-200 p-6 text-center">
        <p class="text-red-500 font-semibold text-lg mb-2">견적을 불러올 수 없습니다</p>
        <p class="text-gray-500 text-sm mb-4" id="error-message">잠시 후 다시 시도해주세요.</p>
        <a href="index.html" class="inline-block px-6 py-2 bg-primary text-white rounded-xl text-sm font-semibold">
          돌아가기
        </a>
      </div>
    </div>

    <!-- 견적서 미리보기 영역 -->
    <div id="preview-area" class="mx-4 mt-4 hidden"></div>

    <!-- 액션 버튼 -->
    <div id="action-buttons" class="mx-4 mt-6 space-y-3 hidden">
      <!-- 공유하기 (Web Share API → 카카오톡/문자/기타 선택) -->
      <button id="btn-share" onclick="handleShare()"
        class="w-full h-14 rounded-2xl font-bold text-base flex items-center justify-center gap-2 active:scale-[0.98] transition-transform bg-[#f97316] text-white">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
        </svg>
        공유하기
      </button>

      <!-- 이미지 저장 -->
      <button id="btn-download" onclick="downloadImage()"
        class="w-full h-14 bg-white border-2 border-gray-200 rounded-2xl font-bold text-base text-gray-700 flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V3"/>
        </svg>
        이미지 저장
      </button>

      <!-- 새 견적 만들기 -->
      <a href="index.html"
        class="w-full h-14 bg-primary text-white rounded-2xl font-bold text-base flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        새 견적 만들기
      </a>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/estimate.js"></script>
  <script>
    let estimateData = null;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!Auth.guard()) {
        window.addEventListener('yr-authenticated', init);
        return;
      }
      init();
    });

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const estimateId = params.get('id');

      if (!estimateId) {
        showError('견적 ID가 없습니다.');
        return;
      }

      try {
        // sessionStorage에서 먼저 확인
        const cached = sessionStorage.getItem('yr-estimate-' + estimateId);
        if (cached) {
          estimateData = JSON.parse(cached);
        } else {
          estimateData = await API.getEstimate(estimateId);
        }

        if (!estimateData) {
          showError('견적 데이터를 찾을 수 없습니다.');
          return;
        }

        renderPreview(estimateData);
      } catch (err) {
        showError(err.message || '견적을 불러오는 중 오류가 발생했습니다.');
      }
    }

    function renderPreview(data) {
      const loadingEl = document.getElementById('loading-state');
      const previewEl = document.getElementById('preview-area');
      const buttonsEl = document.getElementById('action-buttons');

      loadingEl.classList.add('hidden');
      previewEl.classList.remove('hidden');
      buttonsEl.classList.remove('hidden');

      previewEl.innerHTML = Estimate.renderPreview(data);
    }

    function showError(message) {
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('error-state').classList.remove('hidden');
      document.getElementById('error-message').textContent = message;
    }

    function handleShare() {
      if (estimateData) {
        Estimate.share(estimateData);
      }
    }

    function downloadImage() {
      Estimate.downloadImage();
    }
  </script>

  <!-- Service Worker 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
