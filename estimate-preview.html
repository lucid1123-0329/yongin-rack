<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>견적서 미리보기 - 용인 랙</title>
  <meta name="description" content="경량랙, 중량랙, 파렛트랙 맞춤형 최저가 견적을 즉시 확인하세요.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="용인 랙 - 견적서 미리보기">
  <meta property="og:description" content="경량랙, 중량랙, 파렛트랙 맞춤형 최저가 견적을 즉시 확인하세요.">
  <meta property="og:image" content="assets/og-image.jpg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#1e3a5f', accent: '#f97316' }, fontFamily: { sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] } } }
    };
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3a5f">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas-pro@1.5.8/dist/html2canvas-pro.min.js"></script>
  <style>
    body { font-family: 'Pretendard', sans-serif; padding-bottom: env(safe-area-inset-bottom, 24px); }
    .doc-tab { padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 8px 8px 0 0; cursor: pointer; border: 1px solid #d1d5db; border-bottom: none; background: #f3f4f6; color: #6b7280; }
    .doc-tab.active { background: #fff; color: #1e3a5f; border-color: #1e3a5f; border-bottom: 1px solid #fff; margin-bottom: -1px; z-index: 1; }
    /* A4 고정 너비 + 모바일 축소 */
    .a4-wrapper { width: 700px; transform-origin: top left; }
    .a4-container { overflow: hidden; }
  </style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script src="js/onesignal-init.js?v=63" defer></script>
  <script src="js/version-check.js" defer></script>
</head>
<body class="bg-[#f7fafc] min-h-screen pb-20">

  <header class="bg-primary text-white px-4 py-4 flex items-center gap-3 sticky top-0 z-40">
    <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center rounded-lg active:bg-white/20">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <h1 class="text-lg font-bold" id="page-title">견적서 미리보기</h1>
  </header>

  <main class="max-w-2xl mx-auto">
    <div id="loading-state" class="mx-4 mt-6">
      <div class="bg-white rounded-2xl border border-gray-100 p-6 animate-pulse">
        <div class="h-5 bg-gray-200 rounded w-1/3 mx-auto mb-4"></div>
        <div class="h-8 bg-gray-200 rounded w-2/3 mx-auto mb-6"></div>
        <div class="space-y-3"><div class="h-4 bg-gray-200 rounded w-full"></div><div class="h-4 bg-gray-200 rounded w-5/6"></div></div>
      </div>
    </div>

    <div id="error-state" class="mx-4 mt-6 hidden">
      <div class="bg-white rounded-2xl border border-red-200 p-6 text-center">
        <p class="text-red-500 font-semibold text-lg mb-2">견적을 불러올 수 없습니다</p>
        <p class="text-gray-500 text-sm mb-4" id="error-message"></p>
        <a href="index.html" class="inline-block px-6 py-2 bg-primary text-white rounded-xl text-sm font-semibold">돌아가기</a>
      </div>
    </div>

    <!-- 문서 타입 전환 탭 -->
    <div id="doc-tabs" class="mx-4 mt-4 hidden flex gap-1 border-b border-gray-300">
      <button class="doc-tab active" data-doc="formal" onclick="switchDoc('formal')">정식 견적서</button>
      <button class="doc-tab" data-doc="simple" onclick="switchDoc('simple')">간편 견적서</button>
      <button class="doc-tab" data-doc="transaction" onclick="switchDoc('transaction')">거래명세표</button>
    </div>

    <!-- 마진 숨기기 토글 -->
    <div id="margin-toggle" class="mx-4 mt-3 hidden">
      <label class="flex items-center gap-3 bg-white rounded-xl border border-gray-100 px-4 py-3 cursor-pointer active:bg-gray-50">
        <input type="checkbox" id="chk-hide-margin" onchange="renderDoc()" class="w-5 h-5 rounded accent-primary">
        <div>
          <span class="text-sm font-bold text-gray-700">마진 단가 적용</span>
          <p class="text-[11px] text-gray-400 mt-0.5">마진을 각 품목 단가에 배분하여 마진 항목을 숨깁니다</p>
        </div>
      </label>
    </div>

    <!-- 미리보기 영역 -->
    <div id="preview-container" class="mx-4 mt-3 hidden a4-container">
      <div id="preview-area" class="a4-wrapper"></div>
    </div>

    <!-- 액션 버튼 -->
    <div id="action-buttons" class="mx-4 mt-6 space-y-3 hidden">
      <button id="btn-share" onclick="handleShare()"
        class="w-full h-14 rounded-2xl font-bold text-base flex items-center justify-center gap-2 active:scale-[0.98] transition-transform bg-[#f97316] text-white">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
        공유하기
      </button>
      <button id="btn-download" onclick="handleDownload()"
        class="w-full h-14 bg-white border-2 border-gray-200 rounded-2xl font-bold text-base text-gray-700 flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V3"/></svg>
        이미지 저장
      </button>
      <a href="index.html"
        class="w-full h-14 bg-primary text-white rounded-2xl font-bold text-base flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        새 견적 만들기
      </a>
    </div>
  </main>

  <script src="js/api.js?v=63"></script>
  <script src="js/auth.js?v=63"></script>
  <script src="js/ui.js?v=63"></script>
  <script src="js/app.js?v=63"></script>
  <script src="js/estimate.js?v=63"></script>
  <script>
    let estimateData = null;
    let currentDoc = 'formal';

    document.addEventListener('DOMContentLoaded', async () => {
      // URL에서 문서 타입 확인
      const params = new URLSearchParams(window.location.search);
      if (params.get('doc') === 'transaction') currentDoc = 'transaction';

      if (!Auth.guard()) {
        window.addEventListener('yr-authenticated', init);
        return;
      }
      init();
    });

    async function init() {
      UI.renderTabBar('estimate');
      const params = new URLSearchParams(window.location.search);
      const estimateId = params.get('id');
      if (!estimateId) { showError('견적 ID가 없습니다.'); return; }

      try {
        const cached = sessionStorage.getItem('yr-estimate-' + estimateId);
        estimateData = cached ? JSON.parse(cached) : await API.getEstimate(estimateId);
        if (!estimateData) { showError('견적 데이터를 찾을 수 없습니다.'); return; }
        if (!estimateData.estimateId) estimateData.estimateId = estimateId;
        renderDoc();
      } catch (err) {
        showError(err.message || '견적을 불러오는 중 오류가 발생했습니다.');
      }
    }

    function renderDoc() {
      const loadingEl = document.getElementById('loading-state');
      const previewEl = document.getElementById('preview-area');
      const buttonsEl = document.getElementById('action-buttons');
      const tabsEl = document.getElementById('doc-tabs');

      const containerEl = document.getElementById('preview-container');

      loadingEl.classList.add('hidden');
      containerEl.classList.remove('hidden');
      buttonsEl.classList.remove('hidden');
      tabsEl.classList.remove('hidden');

      // 마진 토글 표시 (마진 항목이 있을 때만)
      const marginToggle = document.getElementById('margin-toggle');
      const items = estimateData.items || [];
      const parsed = typeof items === 'string' ? JSON.parse(items) : items;
      const hasMargin = parsed.some(i => i.itemType === 'custom' && (i.name || '').includes('마진'));
      if (marginToggle) marginToggle.classList.toggle('hidden', !hasMargin);

      // 마진 숨기기 옵션
      const hideMargin = document.getElementById('chk-hide-margin')?.checked || false;
      const opts = hideMargin ? { hideMargin: true } : undefined;

      // 탭 활성화
      document.querySelectorAll('.doc-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.doc === currentDoc);
      });

      switch (currentDoc) {
        case 'transaction':
          previewEl.innerHTML = Estimate.renderTransactionStatement(estimateData, opts);
          document.getElementById('page-title').textContent = '거래명세표';
          break;
        case 'simple':
          previewEl.innerHTML = Estimate.renderPreview(estimateData, opts);
          document.getElementById('page-title').textContent = '간편 견적서';
          break;
        default:
          previewEl.innerHTML = Estimate.renderFormalQuotation(estimateData, opts);
          document.getElementById('page-title').textContent = '정식 견적서';
      }

      // A4 스케일 적용 (정식/거래명세표만)
      if (currentDoc === 'simple') {
        previewEl.style.width = '';
        previewEl.style.transform = '';
        previewEl.classList.remove('a4-wrapper');
        containerEl.style.height = '';
      } else {
        previewEl.classList.add('a4-wrapper');
        requestAnimationFrame(() => {
          const containerW = containerEl.clientWidth;
          const docW = 700;
          const scale = Math.min(1, containerW / docW);
          previewEl.style.transform = `scale(${scale})`;
          previewEl.style.width = docW + 'px';
          containerEl.style.height = (previewEl.scrollHeight * scale) + 'px';
        });
      }
    }

    function switchDoc(type) {
      currentDoc = type;
      renderDoc();
    }

    function showError(message) {
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('error-state').classList.remove('hidden');
      document.getElementById('error-message').textContent = message;
    }

    async function handleShare() {
      if (!estimateData) return;
      const hideMargin = document.getElementById('chk-hide-margin')?.checked || false;
      const opts = hideMargin ? { hideMargin: true } : undefined;
      await Estimate.share(estimateData, currentDoc, opts);

      // 요청에서 온 견적이면 → 견적발송 상태 + estimateId 연결
      const params = new URLSearchParams(location.search);
      const reqRow = params.get('requestRowIndex');
      if (reqRow && estimateData && estimateData.estimateId) {
        try {
          await API.updateRequestStatus(Number(reqRow), '견적발송');
          await API.linkEstimateToRequest(Number(reqRow), estimateData.estimateId);
          UI.toast('요청 상태가 견적발송으로 변경되었습니다', 'info', 3000);
        } catch {}
      }
    }

    function handleDownload() {
      Estimate.downloadImage(currentDoc);
    }
  </script>
  <!-- Service Worker 등록 + 자동 업데이트 -->
  <script>
    if ('serviceWorker' in navigator) {
      const hadController = !!navigator.serviceWorker.controller;
      navigator.serviceWorker.register('sw.js').then(reg => {
        if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              nw.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      }).catch(() => {});
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!hadController || refreshing) return;
        // 쿨다운 가드: version-check 등에서 이미 reload 했으면 스킵
        if (window.__yr_reloadGuard && !window.__yr_reloadGuard.canReload()) return;
        refreshing = true;
        if (window.__yr_reloadGuard) window.__yr_reloadGuard.markReload();
        location.reload();
      });
    }
  </script>
</body>
</html>
